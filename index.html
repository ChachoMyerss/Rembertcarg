<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Flota Terreno</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
    --bg:#14161A;
    --surface:#1E2128;
    --surface-alt:#262A33;
    --border:#333844;
    --text:#E8EAED;
    --text-dim:#9AA3AF;
    --accent:#FFB020;
    --accent-dim:#3A2E14;
    --success:#3DDC84;
    --success-dim:#173327;
    --danger:#FF5C5C;
    --danger-dim:#3A1B1B;
    --warning:#FFD166;
    --warning-dim:#3A2F13;
  }
  *{box-sizing:border-box;}
  #app{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    max-width:460px;
    margin:0 auto;
    min-height:100vh;
    padding:0 0 40px 0;
  }
  .eyebrow{
    font-family:'Oswald',sans-serif;
    font-size:11px;
    letter-spacing:2.5px;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:600;
  }
  h1,h2,h3{
    font-family:'Oswald',sans-serif;
    text-transform:uppercase;
    letter-spacing:0.5px;
    margin:0;
  }
  .topbar{
    padding:20px 20px 16px;
    border-bottom:1px solid var(--border);
    position:sticky; top:0; background:var(--bg); z-index:5;
    display:flex; justify-content:space-between; align-items:flex-end;
  }
  h1{font-size:20px; font-weight:700; margin-top:4px;}
  .chofer-tag{font-size:11px; color:var(--text-dim); text-align:right;}
  .section{padding:18px 20px;}
  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:16px;
    margin-bottom:14px;
  }
  .veh-list{display:flex; flex-direction:column; gap:10px;}
  .veh-item{
    display:flex; justify-content:space-between; align-items:center;
    background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:14px 16px; cursor:pointer;
    transition:border-color .15s;
  }
  .veh-item:active{border-color:var(--accent);}
  .veh-item.selected{border-color:var(--accent); background:var(--accent-dim);}
  .veh-patente{font-family:'JetBrains Mono',monospace; font-weight:700; font-size:16px;}
  .veh-sub{font-size:12px; color:var(--text-dim); margin-top:2px;}
  .chev{color:var(--text-dim); font-size:18px;}

  .gauge-cluster{margin-bottom:18px;}
  .gauge{
    background:#0D0F13;
    border:1px solid var(--border);
    border-radius:8px;
    padding:12px 14px;
  }
  .gauge-label{
    font-size:10px; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--text-dim); margin-bottom:6px;
  }
  .gauge-value{
    font-family:'JetBrains Mono',monospace;
    font-size:22px; font-weight:700;
    letter-spacing:1px;
    font-variant-numeric:tabular-nums;
  }
  .gauge-ref{
    font-size:11px; color:var(--text-dim); margin-top:4px;
    font-family:'JetBrains Mono',monospace;
  }

  label{
    display:block; font-size:12px; color:var(--text-dim);
    margin-bottom:6px; letter-spacing:0.3px;
  }
  input[type=text], input[type=number], input[type=email], input[type=password], select, textarea{
    width:100%;
    background:#0D0F13;
    border:1px solid var(--border);
    color:var(--text);
    font-family:'JetBrains Mono',monospace;
    font-size:18px;
    padding:12px 14px;
    border-radius:8px;
    margin-bottom:14px;
    -webkit-appearance:none;
    appearance:none;
  }
  select{font-family:'Inter',sans-serif; font-size:15px;}
  textarea{font-family:'Inter',sans-serif; font-size:14px; resize:vertical; min-height:80px;}
  input:focus, select:focus, textarea:focus{outline:2px solid var(--accent); border-color:transparent;}

  .login-screen{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
  .login-box{width:100%; max-width:340px;}
  .login-box h1{font-size:19px; margin:6px 0 20px;}
  .login-error{background:var(--danger-dim); border:1px solid var(--danger); color:var(--danger); padding:10px 12px; border-radius:8px; font-size:13px; margin-bottom:14px;}
  .logout-link{font-size:11px; color:var(--text-dim); text-decoration:underline; cursor:pointer; margin-top:2px;}

  .badge{
    display:inline-flex; align-items:center; gap:6px;
    font-size:11px; font-weight:600; letter-spacing:0.5px;
    padding:5px 10px; border-radius:999px; text-transform:uppercase;
  }
  .badge-ok{background:var(--success-dim); color:var(--success);}
  .badge-warn{background:var(--warning-dim); color:var(--warning);}
  .badge-danger{background:var(--danger-dim); color:var(--danger);}

  .btn{
    width:100%;
    font-family:'Oswald',sans-serif;
    font-size:15px; font-weight:600; letter-spacing:1px; text-transform:uppercase;
    padding:15px; border-radius:9px; border:none; cursor:pointer;
    transition:transform .08s;
  }
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--accent); color:#1A1300;}
  .btn-primary:disabled{background:#4A4330; color:#8A8270; cursor:not-allowed;}
  .btn-danger{background:var(--danger); color:#2A0000;}
  .btn-ghost{background:transparent; border:1px solid var(--border); color:var(--text);}
  .btn-secondary{background:var(--surface-alt); color:var(--text); border:1px solid var(--border);}
  .btn-row{display:flex; gap:10px; margin-bottom:10px;}
  .btn-row .btn{margin-bottom:0;}

  .checklist-cat{
    font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--text-dim); margin:16px 0 8px; font-family:'Oswald',sans-serif;
  }
  .checklist-item{
    padding:14px 0; border-bottom:1px solid var(--border);
  }
  .checklist-item-top{display:flex; justify-content:space-between; align-items:center; gap:8px;}
  .item-name{font-size:14px;}
  .seg{display:flex; gap:4px; flex-shrink:0;}
  .seg-btn{
    font-family:'Oswald',sans-serif; font-size:11px; font-weight:600;
    padding:6px 14px; border-radius:6px; border:1px solid var(--border);
    background:transparent; color:var(--text-dim); cursor:pointer;
  }
  .seg-btn.active-ok{background:var(--success-dim); color:var(--success); border-color:var(--success);}
  .seg-btn.active-nc{background:var(--warning-dim); color:var(--warning); border-color:var(--warning);}
  .nc-box{background:var(--surface-alt); padding:12px; border-radius:8px; margin-top:10px;}

  .alert{
    display:flex; gap:10px; align-items:flex-start;
    background:var(--danger-dim); border:1px solid var(--danger);
    color:var(--danger); padding:12px 14px; border-radius:8px;
    font-size:13px; margin-bottom:14px;
  }
  .alert.warn{background:var(--warning-dim); border-color:var(--warning); color:var(--warning);}

  .summary-row{
    display:flex; justify-content:space-between; padding:8px 0;
    border-bottom:1px solid var(--border); font-size:14px;
  }
  .summary-row span:last-child{font-family:'JetBrains Mono',monospace; font-weight:700;}
  .link-back{
    color:var(--text-dim); font-size:13px; margin-bottom:14px; display:inline-block; cursor:pointer;
  }

  .log-item{
    background:var(--surface); border:1px solid var(--border); border-radius:9px;
    padding:12px 14px; margin-bottom:8px;
  }
  .log-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;}
  .log-title{font-size:13px; font-weight:600;}
  .log-meta{font-size:12px; color:var(--text-dim); font-family:'JetBrains Mono',monospace;}
  .empty-state{
    text-align:center; padding:30px 10px; color:var(--text-dim); font-size:13px;
  }
  .stat-row{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
  .stat{background:var(--surface); border:1px solid var(--border); border-radius:9px; padding:12px 14px;}
  .stat-label{font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); margin-bottom:4px;}
  .stat-value{font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:700;}

  /* --- Fotos y Galería Quincenal --- */
  .foto-block{margin-bottom:14px;}
  .foto-row{display:flex; align-items:center; gap:10px;}
  .foto-btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    font-family:'Oswald',sans-serif; font-size:12px; font-weight:600; letter-spacing:0.5px;
    text-transform:uppercase; background:var(--surface-alt); border:1px solid var(--border);
    color:var(--text); padding:9px 12px; border-radius:7px; cursor:pointer;
  }
  .foto-thumb{
    width:52px; height:52px; object-fit:cover; border-radius:7px; border:1px solid var(--border);
  }
  .repo-box{background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:14px;}
  .repo-title{font-size:14px; font-weight:600; margin-bottom:10px;}
  .photo-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(70px, 1fr)); gap:8px; margin-top:10px;}
  .photo-grid img{width:100%; height:70px; object-fit:cover; border-radius:6px; border:1px solid var(--border);}

  /* --- Estados de carga / error --- */
  .center-screen{
    min-height:60vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:20px;
  }
  .spinner{
    width:28px; height:28px; border-radius:50%;
    border:3px solid var(--border); border-top-color:var(--accent);
    animation:spin .8s linear infinite; margin-bottom:14px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .save-error{
    background:var(--danger-dim); border:1px solid var(--danger); color:var(--danger);
    padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:14px;
  }
</style>

<div id="app"></div>

<script>
(function(){

  // =====================================================================
  // CONFIGURACIÓN DE SUPABASE
  // =====================================================================
  const SUPABASE_URL = 'https://jxjevmykipkxdfdczznt.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amV2bXlraXBreGRmZGN6em50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MzA4MzQsImV4cCI6MjA5NzQwNjgzNH0.zJbYDqJi1YcbbxHMz6DFXdMxWhF4k_WxPcuj4dXmeX0';
  const FOTOS_BUCKET = 'flota-fotos';

  const supabase = (window.supabase && SUPABASE_URL.indexOf('TU-PROYECTO') === -1)
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null;

  // =====================================================================
  // ESTADO
  // =====================================================================
  let state = {
    booting: true,          
    session: null,
    loginForm: { email:'', password:'' },
    loginError: null,
    loggingIn: false,

    loading: true,
    loadError: null,
    screen: 'select-vehicle',

    chofer: null,
    vehiculos: [],
    checklistItems: [],

    vehiculo: null,
    ultimoOdometro: null,
    cargandoUltimoOdometro: false,

    odo_inicio: '', odo_inicio_foto: null,
    odo_fin: '', odo_fin_foto: null,

    checklist_pre: {}, checklist_pre_fotos: {}, checklist_pre_comentarios: {},
    checklist_post: {}, checklist_post_fotos: {}, checklist_post_comentarios: {},
    
    quincenal: { puertas:[], parachoques:[], focos:[], espejos:[], costados:[] },

    turnoId: null,
    viajes: [],
    gastos: [],
    viajeForm: { scooters:'', baterias:'', odo_salida:'', odo_regreso:'', editId:null },
    viajeCierreForm: { odo_regreso:'' },
    gastoForm: { tipo:'combustible', monto:'', litros:'', odo:'', foto:null, comentario:'', editId:null, fotoExistenteUrl:null },

    saving: false,
    saveError: null,
  };

  const TIPO_GASTO_LABEL = { combustible:'Combustible', peaje:'Peaje', mantencion:'Mantención', otro:'Otro' };

  // =====================================================================
  // HELPERS DE ESTADO / RENDER
  // =====================================================================
  function render(){
    const app = document.getElementById('app');
    const active = document.activeElement;
    const activeId = active && active.id;
    let selStart = null, selEnd = null;
    try {
      if (active && typeof active.selectionStart === 'number'){
        selStart = active.selectionStart;
        selEnd = active.selectionEnd;
      }
    } catch(e){}

    app.innerHTML = state.booting ? loadingScreen() : (!supabase) ? errorScreen() : (!state.session) ? loginScreen() : `
      <div class="topbar">
        <div>
          <div class="eyebrow">Flota · Terreno</div>
          <h1>Bitácora de Turno</h1>
        </div>
        <div style="text-align:right;">
          ${state.chofer ? `<div class="chofer-tag">${state.chofer.nombre}</div>` : ''}
          <span class="logout-link" id="btn-logout">Cerrar sesión</span>
        </div>
      </div>
      ${screenBody()}
    `;
    bindEvents();

    if (activeId){
      const el = document.getElementById(activeId);
      if (el){
        el.focus();
        if (selStart !== null && el.setSelectionRange){
          try { el.setSelectionRange(selStart, selEnd); } catch(e){}
        }
      }
    }
  }

  let renderScheduled = false;
  function scheduleRender(){
    if (renderScheduled) return;
    renderScheduled = true;
    Promise.resolve().then(() => { renderScheduled = false; render(); });
  }
  
  function setState(patch){
    state = Object.assign({}, state, patch);
    scheduleRender();
  }
  
  // Utilidad para forzar el renderizado de sub-objetos (solo cuando es visualmente necesario)
  function setStateField(obj, key, value){
    state = Object.assign({}, state, { [obj]: Object.assign({}, state[obj], { [key]: value }) });
    scheduleRender();
  }

  function sanitizeNumeric(raw, allowDecimal){
    let v = raw;
    if (allowDecimal) v = v.replace(/,/g, '.'); 
    v = allowDecimal ? v.replace(/[^0-9.]/g, '') : v.replace(/[^0-9]/g, '');
    if (allowDecimal){
      const firstDot = v.indexOf('.');
      if (firstDot !== -1){
        v = v.slice(0, firstDot + 1) + v.slice(firstDot + 1).replace(/\./g, '');
      }
    }
    return v;
  }

  // OPTIMIZACIÓN DE RENDIMIENTO: Escribe silenciosamente sin redibujar la pantalla.
  function bindNumericInput(id, onChange, allowDecimal){
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', e => {
      const clean = sanitizeNumeric(e.target.value, allowDecimal);
      if (clean !== e.target.value){
        const pos = el.selectionStart - (e.target.value.length - clean.length);
        el.value = clean;
        try { el.setSelectionRange(pos, pos); } catch(err){}
      }
      onChange(clean); 
    });
  }

  // =====================================================================
  // FOTOS
  // =====================================================================
  const objectUrlCache = new WeakMap();
  function previewUrl(file){
    if (!file) return null;
    if (!objectUrlCache.has(file)) objectUrlCache.set(file, URL.createObjectURL(file));
    return objectUrlCache.get(file);
  }

  function fotoField(id, label, file, existingUrl){
    const src = file ? previewUrl(file) : (existingUrl || null);
    return `
      <div class="foto-block">
        ${label ? `<label>${label}</label>` : ''}
        <div class="foto-row">
          <input type="file" accept="image/*" capture="environment" id="${id}" style="display:none;">
          <label for="${id}" class="foto-btn">${src ? '🔁 Cambiar' : '📷 Adjuntar foto'}</label>
          ${src ? `<img src="${src}" class="foto-thumb">` : ''}
        </div>
      </div>
    `;
  }

  function bindFileInput(id, onChange){
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('change', e => {
      const file = e.target.files && e.target.files[0];
      if (file) onChange(file);
    });
  }

  async function uploadFoto(file, path){
    if (!file) return null;
    if (!supabase) return null;
    const ext = (file.name && file.name.includes('.')) ? file.name.split('.').pop() : 'jpg';
    const fullPath = `${path}-${Date.now()}.${ext}`;
    const { error } = await supabase.storage.from(FOTOS_BUCKET).upload(fullPath, file, { upsert: false });
    if (error) throw error;
    const { data } = supabase.storage.from(FOTOS_BUCKET).getPublicUrl(fullPath);
    return data ? data.publicUrl : null;
  }

  // =====================================================================
  // CARGA DE DATOS REALES
  // =====================================================================
  async function login(){
    setState({ loggingIn:true, loginError:null });
    const { email, password } = state.loginForm;
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error){
      setState({ loggingIn:false, loginError: 'No se pudo iniciar sesión: ' + error.message });
      return;
    }
    setState({ loggingIn:false, session: data.session });
    init();
  }

  async function logout(){
    await supabase.auth.signOut();
    setState({
      session:null, chofer:null, loading:true, loadError:null,
      screen:'select-vehicle', vehiculo:null, turnoId:null,
      loginForm:{ email:'', password:'' }, loginError:null,
    });
  }

  async function init(){
    if (!supabase){
      setState({ loading:false, loadError:'Falta configurar SUPABASE_URL.' });
      return;
    }
    try {
      const { data: authData, error: authErr } = await supabase.auth.getUser();
      if (authErr || !authData || !authData.user) throw new Error('No hay sesión activa.');

      const { data: perfil, error: perfilErr } = await supabase.from('usuarios').select('id, nombre, rol').eq('auth_user_id', authData.user.id).maybeSingle();
      if (perfilErr) throw perfilErr;
      if (!perfil) throw new Error('Tu cuenta no está vinculada a un chofer en la tabla "usuarios".');

      const { data: vehiculos, error: vehErr } = await supabase.from('vehiculos').select('*').eq('activo', true).order('patente');
      if (vehErr) throw vehErr;

      const { data: items, error: itemsErr } = await supabase.from('checklist_items').select('*').eq('activo', true).order('categoria');
      if (itemsErr) throw itemsErr;

      const { data: turnoAbierto } = await supabase
        .from('turnos').select('*')
        .eq('chofer_id', perfil.id).eq('estado', 'abierto')
        .order('fecha_inicio', { ascending: false }).limit(1).maybeSingle();

      if (turnoAbierto) {
        const vehiculoRecuperado = vehiculos.find(v => v.id === turnoAbierto.vehiculo_id);
        const [{ data: viajes }, { data: gastos }] = await Promise.all([
          supabase.from('viajes_bodega').select('*').eq('turno_id', turnoAbierto.id),
          supabase.from('gastos').select('*').eq('turno_id', turnoAbierto.id)
        ]);

        setState({
          loading: false, chofer: perfil, vehiculos: vehiculos, checklistItems: items,
          turnoId: turnoAbierto.id, vehiculo: vehiculoRecuperado, odo_inicio: turnoAbierto.odometro_inicio,
          viajes: viajes || [], gastos: gastos || [], screen: 'active' 
        });
      } else {
        setState({ loading:false, chofer: perfil, vehiculos: vehiculos || [], checklistItems: items || [], screen: 'select-vehicle' });
      }
    } catch(e){
      setState({ loading:false, loadError: e.message || String(e) });
    }
  }

  async function cargarUltimoOdometro(vehiculoId){
    setState({ cargandoUltimoOdometro: true });
    try {
      const { data, error } = await supabase.from('turnos').select('odometro_fin').eq('vehiculo_id', vehiculoId).in('estado', ['cerrado', 'con_discrepancia']).order('fecha_fin', { ascending:false }).limit(1).maybeSingle();
      if (error) throw error;
      setState({ ultimoOdometro: data ? data.odometro_fin : 0, cargandoUltimoOdometro:false });
    } catch(e){
      setState({ ultimoOdometro: 0, cargandoUltimoOdometro:false });
    }
  }

  function evalContinuidad(valorIngresado, ultimoValor){
    const v = parseFloat(valorIngresado);
    if (isNaN(v)) return { status:'empty' };
    if (ultimoValor === null || ultimoValor === undefined) return { status:'ok', diff:0 };
    if (v < ultimoValor) return { status:'error', diff: ultimoValor - v };
    const diff = v - ultimoValor;
    if (diff > 50) return { status:'discrepancia', diff };
    return { status:'ok', diff };
  }

  // =====================================================================
  // ACCIONES CONTRA LA BASE DE DATOS
  // =====================================================================
  async function guardarChecklist(momento, turnoIdParaEnlazar){
    const respuestas = momento === 'pre' ? state.checklist_pre : state.checklist_post;
    const fotos = momento === 'pre' ? state.checklist_pre_fotos : state.checklist_post_fotos;
    const comentarios = momento === 'pre' ? state.checklist_pre_comentarios : state.checklist_post_comentarios;

    const { data: checklist, error: cErr } = await supabase.from('checklists_realizados').insert({
      turno_id: turnoIdParaEnlazar || null, vehiculo_id: state.vehiculo.id, chofer_id: state.chofer.id, momento
    }).select().single();
    if (cErr) throw cErr;

    // Solo guardamos las respuestas de los ítems que se le mostraron al usuario
    let itemsAProcesar = state.checklistItems;
    if (momento === 'post') {
      itemsAProcesar = itemsAProcesar.filter(i => 
        !i.nombre.toLowerCase().includes('aceite') && 
        !i.nombre.toLowerCase().includes('refrigerante') &&
        !i.nombre.toLowerCase().includes('agua')
      );
    }

    for (const item of itemsAProcesar){
      const val = respuestas[item.id];
      if (!val) continue;
      const file = fotos[item.id];
      const fotoUrl = file ? await uploadFoto(file, `checklist/${checklist.id}/${item.id}`) : null;
      const { error: rErr } = await supabase.from('inspeccion_respuestas').insert({
        checklist_id: checklist.id, item_id: item.id, estado: val, comentario: comentarios[item.id] || null, foto_url: fotoUrl
      });
      if (rErr) throw new Error(`Error en el ítem "${item.nombre}": ${rErr.message}`);
    }
    return checklist;
  }

  async function confirmarChecklistPre(){
    setState({ saving:true, saveError:null });
    try {
      const checklist = await guardarChecklist('pre', null);
      const fotoOdoInicio = await uploadFoto(state.odo_inicio_foto, `turnos/odo-inicio-${state.vehiculo.id}`);

      const { data: turno, error: tErr } = await supabase.from('turnos').insert({
        chofer_id: state.chofer.id, vehiculo_id: state.vehiculo.id, odometro_inicio: parseFloat(state.odo_inicio), foto_odometro_inicio_url: fotoOdoInicio
      }).select().single();
      if (tErr) throw tErr;

      const { error: linkErr } = await supabase.from('checklists_realizados').update({ turno_id: turno.id }).eq('id', checklist.id);
      if (linkErr) throw linkErr;
      setState({
        saving:false, saveError:null, turnoId: turno.id, screen:'viaje-form',
        viajeForm: { scooters:'', baterias:'', odo_salida: state.odo_inicio, odo_regreso:'', editId:null },
      });
    } catch(e){
      setState({ saving:false, saveError: e.message || String(e) });
    }
  }

  async function confirmarChecklistPost(){
    setState({ saving:true, saveError:null });
    try {
      await guardarChecklist('post', state.turnoId);
      const fotoOdoFin = await uploadFoto(state.odo_fin_foto, `turnos/odo-fin-${state.turnoId}`);

      const { error: closeErr } = await supabase.from('turnos').update({
        odometro_fin: parseFloat(state.odo_fin), foto_odometro_fin_url: fotoOdoFin, fecha_fin: new Date().toISOString(), estado: 'cerrado'
      }).eq('id', state.turnoId);
      if (closeErr) throw closeErr;

      setState({ saving:false, saveError:null, screen:'summary' });
    } catch(e){
      setState({ saving:false, saveError: e.message || String(e) });
    }
  }

  function viajeEnCurso(){
    return state.viajes.find(v => v.odometro_regreso === null || v.odometro_regreso === undefined) || null;
  }

  function odoSugeridoNuevoViaje(){
    const finalizados = state.viajes.filter(v => v.odometro_regreso !== null && v.odometro_regreso !== undefined);
    if (finalizados.length > 0) return String(finalizados[finalizados.length - 1].odometro_regreso);
    return state.odo_inicio;
  }

  async function iniciarViaje(){
    setState({ saving:true, saveError:null });
    try {
      const f = state.viajeForm;
      const { data, error } = await supabase.from('viajes_bodega').insert({
        turno_id: state.turnoId, hora_salida_bodega: new Date().toISOString(), hora_regreso_centro: null,
        odometro_salida: parseFloat(f.odo_salida), odometro_regreso: null,
        scooters_cargados: parseInt(f.scooters, 10) || 0, baterias_cargadas: parseInt(f.baterias, 10) || 0,
      }).select().single();
      if (error) throw error;
      setState({ saving:false, saveError:null, viajes:[...state.viajes, data], screen:'active' });
    } catch(e){
      setState({ saving:false, saveError: e.message || String(e) });
    }
  }

  async function actualizarViaje(){
    setState({ saving:true, saveError:null });
    try {
      const f = state.viajeForm;
      const patch = {
        scooters_cargados: parseInt(f.scooters, 10) || 0,
        baterias_cargadas: parseInt(f.baterias, 10) || 0,
        odometro_salida: parseFloat(f.odo_salida),
      };
      if (f.odo_regreso !== ''){
        patch.odometro_regreso = parseFloat(f.odo_regreso);
      }
      const { data, error } = await supabase.from('viajes_bodega').update(patch).eq('id', f.editId).select().single();
      if (error) throw error;
      setState({ saving:false, saveError:null, viajes: state.viajes.map(v => v.id === data.id ? data : v), screen:'active' });
    } catch(e){
      setState({ saving:false, saveError: e.message || String(e) });
    }
  }

  async function finalizarViaje(){
    const v = viajeEnCurso();
    if (!v) return;
    setState({ saving:true, saveError:null });
    try {
      const odoRegreso = parseFloat(state.viajeCierreForm.odo_regreso);
      const { data, error } = await supabase.from('viajes_bodega').update({
        odometro_regreso: odoRegreso, hora_regreso_centro: new Date().toISOString(),
      }).eq('id', v.id).select().single();
      if (error) throw error;
      setState({ saving:false, saveError:null, viajes: state.viajes.map(x => x.id === data.id ? data : x), viajeCierreForm:{odo_regreso:''}, screen:'active' });
    } catch(e){
      setState({ saving:false, saveError: e.message || String(e) });
    }
  }

  async function guardarGasto(){
    setState({ saving:true, saveError:null });
    try {
      const f = state.gastoForm;
      const fotoUrl = f.foto ? await uploadFoto(f.foto, `gastos/${state.turnoId}-${Date.now()}`) : null;

  async function actualizarGasto(){
    setState({ saving:true, saveError:null });
    try {
      const f = state.gastoForm;

      };

      setState({ saving:false, saveError:null, gastos: state.gastos.map(g => g.id === data.id ? data : g), screen:'active' });

    }

  async function guardarQuincenal(){
    setState({ saving:true, saveError:null });
    try {
      const links = { puertas:[], parachoques:[], focos:[], espejos:[], costados:[] };
      const catUrls = Object.keys(links);
      
      for(const cat of catUrls){
        const files = state.quincenal[cat] || [];
        for(const f of files){
          const url = await uploadFoto(f, `quincenal/${state.vehiculo.id}/${cat}`);
          if(url) links[cat].push(url);
        }
      }

      const { error } = await supabase.from('registro_fotografico_quincenal').insert({
        vehiculo_id: state.vehiculo.id, chofer_id: state.chofer.id,
        fotos_puertas: links.puertas, fotos_parachoques: links.parachoques,
        fotos_focos: links.focos, fotos_espejos: links.espejos, fotos_costados: links.costados
      });
      if (error) throw error;

      alert("Registro de carrocería guardado con éxito.");
      setState({ saving:false, screen:'start-readings', quincenal:{ puertas:[], parachoques:[], focos:[], espejos:[], costados:[] } });
    } catch(e) {
      setState({ saving:false, saveError: "Error al subir fotos: " + e.message });
    }
  }

  // =====================================================================
  // PANTALLAS
  // =====================================================================
  function screenBody(){
    if (state.loading) return loadingScreen();
    if (state.loadError) return errorScreen();
    switch(state.screen){
      case 'select-vehicle': return selectVehicleScreen();
      case 'start-readings': return startReadingsScreen();
      case 'checklist-pre': return checklistScreen('pre');
      case 'quincenal': return quincenalScreen();
      case 'active': return activeScreen();
      case 'viaje-form': return viajeFormScreen();
      case 'viaje-cerrar': return viajeCierreScreen();
      case 'gasto-form': return gastoFormScreen();
      case 'gasto-confirm': return gastoConfirmScreen();
      case 'close-readings': return closeReadingsScreen();
      case 'checklist-post': return checklistScreen('post');
      case 'summary': return summaryScreen();
      default: return '';
    }
  }

        <button class="btn btn-primary" id="btn-to-checklist" ${bloqueaAvance ? 'disabled' : ''}>Continuar a Checklist</button>
      </div>
    `;
  }

  function checklistScreen(momento){
    const respuestas = momento === 'pre' ? state.checklist_pre : state.checklist_post;
    const fotos = momento === 'pre' ? state.checklist_pre_fotos : state.checklist_post_fotos;
    const comentarios = momento === 'pre' ? state.checklist_pre_comentarios : state.checklist_post_comentarios;
    
    // FILTRO PARA POST-TURNO: Ocultar niveles y aceites
    let itemsAMostrar = state.checklistItems;
    if (momento === 'post') {
      itemsAMostrar = itemsAMostrar.filter(i => 
        !i.nombre.toLowerCase().includes('aceite') && 
        !i.nombre.toLowerCase().includes('refrigerante') &&
        !i.nombre.toLowerCase().includes('agua')
      );
    }

    const categorias = [...new Set(itemsAMostrar.map(i => i.categoria))];
    const todasRespondidas = itemsAMostrar.length > 0 && itemsAMostrar.every(it =>
      respuestas[it.id] === 'ok' || (respuestas[it.id] === 'nc' && (comentarios[it.id] || '').trim().length > 0)
    );

    return `
      <div class="section">
        <span class="link-back" data-back="${momento === 'pre' ? 'start-readings' : 'close-readings'}">‹ Volver</span>
        <div class="eyebrow" style="margin-bottom:4px;">Paso 3 de 3 · Checklist ${momento.toUpperCase()}</div>
        <h2 style="font-size:17px; margin-bottom:14px;">Inspección técnica</h2>
        ${saveErrorHtml()}

        ${categorias.map(cat => `
          <div class="checklist-cat">${cat}</div>
          ${itemsAMostrar.filter(i => i.categoria === cat).map(it => `
            <div class="checklist-item">
              <div class="checklist-item-top">
                <div class="item-name">${it.nombre}</div>
                <div class="seg">
                  <button class="seg-btn ${respuestas[it.id]==='ok' ? 'active-ok':''}" data-item="${it.id}" data-momento="${momento}" data-val="ok">OK</button>
                  <button class="seg-btn ${respuestas[it.id]==='nc' ? 'active-nc':''}" data-item="${it.id}" data-momento="${momento}" data-val="nc">NC</button>
                </div>
              </div>
              ${respuestas[it.id] === 'nc' ? `
                <div class="nc-box">
                  <label style="color:var(--warning);">Detalla el problema (Obligatorio)</label>
                  <textarea data-comentario="${it.id}" data-momento="${momento}" placeholder="Ej: Foco quemado...">${comentarios[it.id]||''}</textarea>
                  ${fotoField(`chk_foto_${momento}_${it.id}`, 'Foto del detalle', fotos[it.id])}
                </div>
              ` : ''}
            </div>
          `).join('')}
        `).join('')}

        <button class="btn btn-primary" id="btn-checklist-confirm" style="margin-top:16px;" ${(!todasRespondidas || state.saving) ? 'disabled' : ''}>
          ${state.saving ? 'Guardando…' : (momento === 'pre' ? 'Iniciar Turno' : 'Confirmar y Cerrar Turno')}
        </button>
      </div>
    `;
  }

      </div>
    `;

  function renderLogList(){
    const items = [...state.viajes.map(v => ({ tipo:'viaje', data:v })), ...state.gastos.map(g => ({ tipo:'gasto', data:g }))];
    if (items.length === 0) return `<div class="empty-state">Aún no registras viajes ni gastos.</div>`;
    return items.map(it => {
      if (it.tipo === 'viaje'){
        const enCursoItem = it.data.odometro_regreso === null || it.data.odometro_regreso === undefined;
        const km = enCursoItem ? null : (parseFloat(it.data.odometro_regreso) - parseFloat(it.data.odometro_salida));
        return `<div class="log-item" data-edit-viaje="${it.data.id}" style="cursor:pointer;">
          <div class="log-top">
            <span class="log-title">Viaje a bodega</span>
            <span class="log-meta">${enCursoItem ? '<span class="badge badge-warn" style="padding:2px 8px;">En curso</span>' : km.toFixed(0) + ' km'}</span>
          </div>
          <div class="log-meta">${it.data.scooters_cargados || 0} scooters · ${it.data.baterias_cargadas || 0} baterías</div>
        </div>`;
      }
      return `<div class="log-item" data-edit-gasto="${it.data.id}" style="cursor:pointer;">
        <div class="log-top"><span class="log-title">${TIPO_GASTO_LABEL[it.data.tipo] || it.data.tipo}</span><span class="log-meta">$${(parseFloat(it.data.monto)||0).toLocaleString('es-CL')}</span></div>
        ${it.data.litros ? `<div class="log-meta">${it.data.litros} L · odómetro ${Number(it.data.odometro_al_cargar).toLocaleString('es-CL')}</div>` : ''}
      </div>`;
    }).join('');
  }

  function viajeFormScreen(){
    const f = state.viajeForm;
    const esEdicion = !!f.editId;
    const mostrarRegreso = esEdicion && f.odo_regreso !== '';
    const odoIni = parseFloat(state.odo_inicio);
    const odoSalida = parseFloat(f.odo_salida);
    const odoRegreso = f.odo_regreso !== '' ? parseFloat(f.odo_regreso) : null;

    let alertHtml = '';
    if (!isNaN(odoSalida) && odoSalida < odoIni) alertHtml += `<div class="alert">⚠ El odómetro de salida no puede ser menor al inicio del turno (${Number(odoIni).toLocaleString('es-CL')} km).</div>`;
    if (odoRegreso !== null && !isNaN(odoSalida) && odoRegreso < odoSalida) alertHtml += `<div class="alert">⚠ El odómetro de regreso no puede ser menor al de salida.</div>`;

    const bloquea = state.saving || f.odo_salida === '' || (!isNaN(odoSalida) && odoSalida < odoIni) ||
      (mostrarRegreso && (f.odo_regreso === '' || odoRegreso < odoSalida));

    return `
      <div class="section">
        <span class="link-back" data-back="active">‹ Volver</span>
        <div class="eyebrow" style="margin-bottom:14px;">${esEdicion ? 'Editar viaje a bodega' : 'Iniciar viaje a bodega'}</div>
        ${saveErrorHtml()}
        <label>Scooters cargados</label><input type="text" inputmode="numeric" id="v_scooters" value="${f.scooters}">
        <label>Baterías cargadas</label><input type="text" inputmode="numeric" id="v_baterias" value="${f.baterias}">
        <label>Odómetro al LLEGAR a bodega (km)</label><input type="text" inputmode="decimal" id="v_odo_salida" value="${f.odo_salida}">
        ${mostrarRegreso ? `<label>Odómetro al SALIR de bodega (km)</label><input type="text" inputmode="decimal" id="v_odo_regreso" value="${f.odo_regreso}">` : ''}
        ${alertHtml}
        <button class="btn btn-primary" id="btn-guardar-viaje" ${bloquea ? 'disabled' : ''}>${state.saving ? 'Guardando…' : (esEdicion ? 'Guardar cambios' : 'Iniciar Viaje')}</button>
      </div>
    `;
  }

  function viajeCierreScreen(){
    const v = viajeEnCurso();
    if (!v){
      return `<div class="section"><div class="alert">No hay ningún viaje en curso.</div><span class="link-back" data-back="active">‹ Volver</span></div>`;
    }
    const f = state.viajeCierreForm;
    const odoRegreso = f.odo_regreso !== '' ? parseFloat(f.odo_regreso) : null;
    let alertHtml = '';
    if (odoRegreso !== null && odoRegreso < v.odometro_salida) alertHtml = `<div class="alert">⚠ El odómetro no puede ser menor a la llegada a bodega (${Number(v.odometro_salida).toLocaleString('es-CL')} km).</div>`;
    const bloquea = state.saving || f.odo_regreso === '' || (odoRegreso !== null && odoRegreso < v.odometro_salida);

    return `
      <div class="section">
        <span class="link-back" data-back="active">‹ Volver</span>
        <div class="eyebrow" style="margin-bottom:4px;">Finalizar viaje a bodega</div>
        <h2 style="font-size:17px; margin-bottom:14px;">${v.scooters_cargados||0} scooters · ${v.baterias_cargadas||0} baterías</h2>
        ${saveErrorHtml()}
        <div class="gauge-cluster"><div class="gauge"><div class="gauge-label">Odómetro al llegar a bodega</div><div class="gauge-value">${Number(v.odometro_salida).toLocaleString('es-CL')}</div></div></div>
        <label>Odómetro al SALIR de bodega (km)</label>
        <input type="text" inputmode="decimal" id="vc_odo_regreso" value="${f.odo_regreso}" placeholder="${v.odometro_salida}">
        ${alertHtml}
        <button class="btn btn-primary" id="btn-finalizar-viaje" ${bloquea ? 'disabled' : ''}>${state.saving ? 'Guardando…' : 'Finalizar Viaje'}</button>
      </div>
    `;
  }

  function gastoFormScreen(){
    const f = state.gastoForm;
    const v = state.vehiculo;
    const esEdicion = !!f.editId;
    const litrosExcede = f.tipo === 'combustible' && f.litros !== '' && parseFloat(f.litros) > v.capacidad_estanque_l;
    const faltaFoto = !f.foto && !f.fotoExistenteUrl;
    const faltaComentario = f.tipo !== 'combustible' && (!f.comentario || f.comentario.trim() === '');
    
    const bloquea = state.saving || f.monto === '' || faltaFoto ||
      (f.tipo === 'combustible' && (f.litros === '' || f.odo === '' || litrosExcede)) ||
      (f.tipo !== 'combustible' && faltaComentario);

    return `
      <div class="section">
        <span class="link-back" data-back="active">‹ Volver</span>
        <div class="eyebrow" style="margin-bottom:14px;">${esEdicion ? 'Editar gasto' : 'Registrar gasto'}</div>
        ${saveErrorHtml()}
        <label>Tipo de gasto</label>
        <select id="g_tipo">
          ${Object.entries(TIPO_GASTO_LABEL).map(([id,label]) => `<option value="${id}" ${f.tipo===id?'selected':''}>${label}</option>`).join('')}
        </select>
        <label>Monto ($) *</label><input type="text" inputmode="numeric" id="g_monto" value="${f.monto}">
        
        ${f.tipo === 'combustible' ? `
          <label>Litros cargados *</label><input type="text" inputmode="decimal" id="g_litros" value="${f.litros}">
          <label>Odómetro al cargar (km) *</label><input type="text" inputmode="decimal" id="g_odo" value="${f.odo}">
          ${litrosExcede ? `<div class="alert">⚠ ${f.litros} L excede la capacidad del estanque (${v.capacidad_estanque_l} L).</div>` : ''}
        ` : `
          <label>Detalle del gasto *</label>
          <textarea id="g_comentario" placeholder="Especifica en qué se gastó...">${f.comentario || ''}</textarea>
        `}
        
        ${fotoField('g_foto', 'Foto de la boleta *', f.foto, f.fotoExistenteUrl)}
        <button class="btn btn-primary" id="btn-revisar-gasto" ${bloquea ? 'disabled' : ''}>Revisar y Confirmar</button>
      </div>
    `;
  }

  function gastoConfirmScreen(){
    const f = state.gastoForm;
    const src = f.foto ? previewUrl(f.foto) : f.fotoExistenteUrl;
    return `
      <div class="section">
        <span class="link-back" data-back="gasto-form">‹ Editar datos</span>
        <div class="eyebrow" style="margin-bottom:14px;">Confirmar gasto</div>
        ${saveErrorHtml()}
        <div class="card">
          <div class="summary-row"><span>Tipo</span><span>${TIPO_GASTO_LABEL[f.tipo] || f.tipo}</span></div>
          <div class="summary-row"><span>Monto</span><span>$${(parseFloat(f.monto)||0).toLocaleString('es-CL')}</span></div>
          ${f.tipo === 'combustible' ? `
            <div class="summary-row"><span>Litros</span><span>${f.litros} L</span></div>
            <div class="summary-row"><span>Odómetro</span><span>${Number(f.odo).toLocaleString('es-CL')} km</span></div>
          ` : `
            <div class="summary-row" style="flex-direction:column; gap:4px;">
              <span>Detalle:</span>
              <span style="color:var(--text-dim); font-weight:400; font-family:'Inter', sans-serif;">${f.comentario}</span>
            </div>
          `}
        </div>
        ${src ? `<img src="${src}" style="width:100%; border-radius:10px; margin-bottom:14px; border:1px solid var(--border);">` : ''}
        <button class="btn btn-primary" id="btn-confirmar-gasto" ${state.saving ? 'disabled' : ''}>${state.saving ? 'Guardando…' : 'Confirmar y Guardar'}</button>
      </div>
    `;
  }

  function closeReadingsScreen(){
    const odoIni = parseFloat(state.odo_inicio);
    const odoFinNum = parseFloat(state.odo_fin);
    let alertHtml = '';
    if (!isNaN(odoFinNum) && odoFinNum <= odoIni) alertHtml += `<div class="alert">⚠ El odómetro final debe ser mayor al de inicio.</div>`;
    const bloquea = state.odo_fin === '' || odoFinNum <= odoIni;

    return `
      <div class="section">
        <span class="link-back" data-back="active">‹ Volver</span>
        <div class="eyebrow" style="margin-bottom:4px;">Cierre de turno</div>
        <h2 style="font-size:17px; margin-bottom:14px;">${state.vehiculo.patente} — Lectura final</h2>
        <label>Odómetro final (km)</label><input type="text" inputmode="decimal" id="odo_fin" value="${state.odo_fin}" placeholder="${odoIni}">
        ${fotoField('odo_fin_foto', 'Foto del odómetro', state.odo_fin_foto)}
        ${alertHtml}
        <button class="btn btn-primary" id="btn-to-checklist-post" ${bloquea ? 'disabled' : ''}>Continuar a Checklist</button>
      </div>
    `;
  }

  function summaryScreen(){
    const v = state.vehiculo;
    const km = parseFloat(state.odo_fin) - parseFloat(state.odo_inicio);
    return `
      <div class="section">
        <div class="eyebrow" style="margin-bottom:10px;">Turno cerrado</div>
        <div class="card">
          <div class="veh-patente" style="margin-bottom:14px;">${v.patente}</div>
          <div class="summary-row"><span>Km recorridos</span><span>${km.toLocaleString('es-CL')} km</span></div>
          <div class="summary-row"><span>Viajes a bodega</span><span>${state.viajes.length}</span></div>
          <div style="margin-top:14px; display:flex; gap:6px; flex-wrap:wrap;"><span class="badge badge-ok">🟢 Operación normal</span></div>
        </div>
        <button class="btn btn-ghost" id="btn-nuevo-turno">Registrar otro turno</button>
      </div>
    `;
  }

  // =====================================================================
  // EVENTOS
  // =====================================================================
 function bindEvents(){
    document.querySelectorAll('[data-vehiculo]').forEach(el => {
      el.addEventListener('click', () => {
        const v = state.vehiculos.find(x => x.id === el.dataset.vehiculo);
        setState({ vehiculo: v, screen:'start-readings', odo_inicio:'', odo_inicio_foto:null, ultimoOdometro:null, checklist_pre:{}, checklist_pre_fotos:{}, checklist_pre_comentarios:{} });
        cargarUltimoOdometro(v.id);
      });
    });

    const backEl = document.querySelector('[data-back]');
    if (backEl) backEl.addEventListener('click', () => setState({ screen: backEl.dataset.back, saveError:null }));

    // AHORA LAS CASILLAS NO PARPADEAN
    bindNumericInput('odo_inicio', v => { state.odo_inicio = v; }, true);
    bindNumericInput('odo_fin', v => { state.odo_fin = v; }, true);
    bindNumericInput('v_scooters', v => { state.viajeForm.scooters = v; }, false);
    bindNumericInput('v_baterias', v => { state.viajeForm.baterias = v; }, false);
    bindNumericInput('v_odo_salida', v => { state.viajeForm.odo_salida = v; }, true);
    bindNumericInput('v_odo_regreso', v => { state.viajeForm.odo_regreso = v; }, true);
    bindNumericInput('vc_odo_regreso', v => { state.viajeCierreForm.odo_regreso = v; }, true);
    bindNumericInput('g_monto', v => { state.gastoForm.monto = v; }, false);
    bindNumericInput('g_litros', v => { state.gastoForm.litros = v; }, true);
    bindNumericInput('g_odo', v => { state.gastoForm.odo = v; }, true);
    
    // Este necesita actualizar el panel para mostrar u ocultar los litros
    const gTipo = document.getElementById('g_tipo');
    if (gTipo) gTipo.addEventListener('change', e => setStateField('gastoForm','tipo', e.target.value));

    // COMENTARIO DE GASTO EN TIEMPO REAL
    const gComentario = document.getElementById('g_comentario');
    if (gComentario) gComentario.addEventListener('input', e => { state.gastoForm.comentario = e.target.value; });

    bindFileInput('odo_inicio_foto', file => setState({ odo_inicio_foto: file }));
    bindFileInput('odo_fin_foto', file => setState({ odo_fin_foto: file }));
    bindFileInput('g_foto', file => setStateField('gastoForm','foto', file));

    const btnQuin = document.getElementById('btn-quincenal');
    if (btnQuin) btnQuin.addEventListener('click', () => setState({ screen:'quincenal' }));

    document.querySelectorAll('[id^="q_"]').forEach(el => {
      const cat = el.id.replace('q_','');
      el.addEventListener('change', e => {
        setState({ quincenal: Object.assign({}, state.quincenal, { [cat]: e.target.files }) });
      });
    });

    const btnGQ = document.getElementById('btn-guardar-quincenal');
    if (btnGQ) btnGQ.addEventListener('click', guardarQuincenal);

    const btnToChecklist = document.getElementById('btn-to-checklist');
    if (btnToChecklist) btnToChecklist.addEventListener('click', () => setState({ screen:'checklist-pre', saveError:null }));

    document.querySelectorAll('[data-item]').forEach(el => {
      el.addEventListener('click', () => {
        const key = el.dataset.momento === 'pre' ? 'checklist_pre' : 'checklist_post';
        const updated = Object.assign({}, state[key], { [el.dataset.item]: el.dataset.val });
        setState({ [key]: updated });
      });
    });

    document.querySelectorAll('textarea[data-comentario]').forEach(el => {
      el.addEventListener('input', e => {
        const key = e.target.dataset.momento === 'pre' ? 'checklist_pre_comentarios' : 'checklist_post_comentarios';
        // AHORA LA CASILLA DE COMENTARIOS NO PARPADEA
        state[key][e.target.dataset.comentario] = e.target.value;
      });
    });

    document.querySelectorAll('[id^="chk_foto_pre_"]').forEach(el => {
      const itemId = el.id.replace('chk_foto_pre_','');
      el.addEventListener('change', e => {
        const file = e.target.files && e.target.files[0];
        if (file) setState({ checklist_pre_fotos: Object.assign({}, state.checklist_pre_fotos, { [itemId]: file }) });
      });
    });
    document.querySelectorAll('[id^="chk_foto_post_"]').forEach(el => {
      const itemId = el.id.replace('chk_foto_post_','');
      el.addEventListener('change', e => {
        const file = e.target.files && e.target.files[0];
        if (file) setState({ checklist_post_fotos: Object.assign({}, state.checklist_post_fotos, { [itemId]: file }) });
      });
    });

    const btnChecklistConfirm = document.getElementById('btn-checklist-confirm');
    if (btnChecklistConfirm) btnChecklistConfirm.addEventListener('click', () => {
      if (state.screen === 'checklist-pre') confirmarChecklistPre();
      else confirmarChecklistPost();
    });

    const btnNuevoViaje = document.getElementById('btn-nuevo-viaje');
    if (btnNuevoViaje) btnNuevoViaje.addEventListener('click', () => setState({
      screen:'viaje-form', saveError:null,
      viajeForm:{ scooters:'', baterias:'', odo_salida: odoSugeridoNuevoViaje(), odo_regreso:'', editId:null }
    }));
    const btnGuardarViaje = document.getElementById('btn-guardar-viaje');
    if (btnGuardarViaje) btnGuardarViaje.addEventListener('click', () => {
      if (state.viajeForm.editId) actualizarViaje(); else iniciarViaje();
    });

    const btnFinalizarViajeActivo = document.getElementById('btn-finalizar-viaje-activo');
    if (btnFinalizarViajeActivo) btnFinalizarViajeActivo.addEventListener('click', () => setState({
      screen:'viaje-cerrar', saveError:null, viajeCierreForm:{ odo_regreso:'' }
    }));
    const btnFinalizarViaje = document.getElementById('btn-finalizar-viaje');
    if (btnFinalizarViaje) btnFinalizarViaje.addEventListener('click', finalizarViaje);

    document.querySelectorAll('[data-edit-viaje]').forEach(el => {
      el.addEventListener('click', () => {
        const v = state.viajes.find(x => x.id === el.dataset.editViaje);
        if (!v) return;
        setState({
          screen:'viaje-form', saveError:null,
          viajeForm: {
            scooters: String(v.scooters_cargados ?? ''),
            baterias: String(v.baterias_cargadas ?? ''),
            odo_salida: String(v.odometro_salida ?? ''),
            odo_regreso: (v.odometro_regreso !== null && v.odometro_regreso !== undefined) ? String(v.odometro_regreso) : '',
            editId: v.id,
          }
        });
      });
    });

    const btnNuevoGasto = document.getElementById('btn-nuevo-gasto');
    if (btnNuevoGasto) btnNuevoGasto.addEventListener('click', () => setState({
      screen:'gasto-form', saveError:null,
      gastoForm:{ tipo:'combustible', monto:'', litros:'', odo:'', foto:null, comentario:'', editId:null, fotoExistenteUrl:null }
    }));
    const btnRevisarGasto = document.getElementById('btn-revisar-gasto');
    if (btnRevisarGasto) btnRevisarGasto.addEventListener('click', () => setState({ screen:'gasto-confirm', saveError:null }));
    const btnConfirmarGasto = document.getElementById('btn-confirmar-gasto');
    if (btnConfirmarGasto) btnConfirmarGasto.addEventListener('click', () => {
      if (state.gastoForm.editId) actualizarGasto(); else guardarGasto();
    });

    document.querySelectorAll('[data-edit-gasto]').forEach(el => {
      el.addEventListener('click', () => {
        const g = state.gastos.find(x => x.id === el.dataset.editGasto);
        if (!g) return;
        setState({
          screen:'gasto-form', saveError:null,
          gastoForm: {
            tipo: g.tipo, monto: String(g.monto ?? ''),
            litros: (g.litros !== null && g.litros !== undefined) ? String(g.litros) : '',
            odo: (g.odometro_al_cargar !== null && g.odometro_al_cargar !== undefined) ? String(g.odometro_al_cargar) : '',
            comentario: g.comentario || '',
            foto:null, editId: g.id, fotoExistenteUrl: g.boleta_foto_url || null,
          }
        });
      });
    });

    const btnCerrar = document.getElementById('btn-cerrar-turno');
    if (btnCerrar) btnCerrar.addEventListener('click', () => setState({ screen:'close-readings', odo_fin:'', odo_fin_foto:null, checklist_post:{}, checklist_post_fotos:{}, checklist_post_comentarios:{} }));

    const btnToChecklistPost = document.getElementById('btn-to-checklist-post');
    if (btnToChecklistPost) btnToChecklistPost.addEventListener('click', () => setState({ screen:'checklist-post', saveError:null }));

    // LIMPIEZA TOTAL DE MEMORIA AL INICIAR NUEVO TURNO
    const btnNuevo = document.getElementById('btn-nuevo-turno');
    if (btnNuevo) btnNuevo.addEventListener('click', () => {
      setState({ 
        screen:'select-vehicle', vehiculo:null, turnoId:null, 
        viajes: [], gastos: [], odo_inicio: '', odo_fin: '', 
        checklist_pre: {}, checklist_pre_fotos: {}, checklist_pre_comentarios: {},
        checklist_post: {}, checklist_post_fotos: {}, checklist_post_comentarios: {},
        quincenal: { puertas:[], parachoques:[], focos:[], espejos:[], costados:[] } 
      });
    });

    const btnLoginEl = document.getElementById('btn-login');
    if (btnLoginEl) {
      btnLoginEl.addEventListener('click', () => {
        state.loginForm.email = document.getElementById('login_email').value;
        state.loginForm.password = document.getElementById('login_password').value;
        login();
      });
    }
    
    const loginPassEl = document.getElementById('login_password');
    if (loginPassEl) {
      loginPassEl.addEventListener('keydown', e => { 
        if (e.key === 'Enter') {
          state.loginForm.email = document.getElementById('login_email').value;
          state.loginForm.password = document.getElementById('login_password').value;
          login(); 
        }
      });
    }

    const btnLogoutEl = document.getElementById('btn-logout');
    if (btnLogoutEl) btnLogoutEl.addEventListener('click', logout);
  }
  render();

  if (!supabase){
    setState({ booting:false, loading:false, loadError:'Falta configurar SUPABASE_URL y SUPABASE_ANON_KEY.' });
  } else {
    supabase.auth.getSession().then(({ data }) => {
      if (data.session){
        setState({ session: data.session, booting:false });
        init();
      } else {
        setState({ booting:false, loading:false });
      }
    });
  }

})();
</script>
