<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flota — Panel Admin Privado</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
    --bg:#14161A; --surface:#1E2128; --surface-alt:#262A33; --border:#333844;
    --text:#E8EAED; --text-dim:#9AA3AF; --accent:#FFB020; --accent-dim:#3A2E14;
    --success:#3DDC84; --success-dim:#173327; --danger:#FF5C5C; --danger-dim:#3A1B1B;
    --warning:#FFD166; --warning-dim:#3A2F13;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif;}
  h1,h2,h3{font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.5px; margin:0;}
  a{color:var(--accent);}
  .eyebrow{font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:var(--accent); font-weight:600;}
  .shell{display:flex; min-height:100vh;}
  .sidebar{
    width:220px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border);
    padding:22px 16px; display:flex; flex-direction:column; position:sticky; top:0; height:100vh;
  }
  .brand{margin-bottom:26px;}
  .brand h1{font-size:17px; margin-top:4px;}
  .nav-item{
    display:flex; align-items:center; gap:10px; font-family:'Oswald',sans-serif; font-size:13px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase;
    color:var(--text-dim); padding:11px 12px; border-radius:8px; cursor:pointer; margin-bottom:4px;
  }
  .nav-item:hover{background:var(--surface-alt); color:var(--text);}
  .nav-item.active{background:var(--accent-dim); color:var(--accent);}
  .content{flex:1; padding:28px 32px; max-width:1320px; min-width:0;}
  .content-head{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:20px; flex-wrap:wrap; gap:12px;}
  .content-head h2{font-size:22px;}
  .btn{
    font-family:'Oswald',sans-serif; font-size:13px; font-weight:600; letter-spacing:0.8px; text-transform:uppercase;
    padding:10px 16px; border-radius:8px; border:none; cursor:pointer;
  }
  .btn-primary{background:var(--accent); color:#1A1300;}
  .btn-ghost{background:transparent; border:1px solid var(--border); color:var(--text);}
  .filters{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; align-items:flex-end;}
  .filter-field{display:flex; flex-direction:column;}
  input[type=date], select{ background:#0D0F13; border:1px solid var(--border); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:14px; padding:9px 12px; border-radius:8px;}
  .card{background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:18px;}
  .kpi-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(190px,1fr)); gap:14px; margin-bottom:24px; }
  .kpi{background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px 18px;}
  .kpi-label{font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); margin-bottom:6px;}
  .kpi-value{font-family:'JetBrains Mono',monospace; font-size:28px; font-weight:700;}
  .kpi.ok .kpi-value{color:var(--success);}
  .kpi.warn .kpi-value{color:var(--warning);}
  .table-wrap{background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  thead th{ text-align:left; font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--text-dim); padding:12px 14px; border-bottom:1px solid var(--border); background:var(--surface-alt); }
  tbody td{padding:11px 14px; border-bottom:1px solid var(--border); vertical-align:middle;}
  tbody tr.clickable{cursor:pointer;}
  tbody tr.clickable:hover{background:var(--surface-alt);}
  .mono{font-family:'JetBrains Mono',monospace;}
  .dim{color:var(--text-dim);}
  .thumb{width:34px; height:34px; object-fit:cover; border-radius:6px; border:1px solid var(--border);}
  .empty-state{text-align:center; padding:40px 10px; color:var(--text-dim); font-size:13px;}
  .load-row{text-align:center; padding:30px; color:var(--text-dim); font-size:13px;}
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:20; display:flex; justify-content:flex-end;}
  .drawer{width:100%; max-width:560px; background:var(--bg); border-left:1px solid var(--border); height:100vh; overflow-y:auto; padding:24px 26px;}
  .drawer-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px;}
  .drawer-close{background:var(--surface-alt); border:1px solid var(--border); color:var(--text); width:32px; height:32px; border-radius:8px; cursor:pointer;}
  .drawer-section{margin-bottom:22px;}
  .drawer-section-title{font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); font-family:'Oswald',sans-serif; margin-bottom:10px;}
  .meta-row{display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--border); font-size:13px;}
  .meta-row span:last-child{font-family:'JetBrains Mono',monospace; font-weight:600;}
  .chk-item{background:var(--surface); border:1px solid var(--border); border-radius:9px; padding:12px 14px; margin-bottom:8px;}
  .chk-item-top{display:flex; justify-content:space-between; align-items:center; gap:8px;}
  .chk-comment{font-size:12px; color:var(--text-dim); margin-top:6px;}
  .log-item{background:var(--surface); border:1px solid var(--border); border-radius:9px; padding:11px 14px; margin-bottom:8px; font-size:13px;}
  .log-top{display:flex; justify-content:space-between;}
  .badge{display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; padding:4px 9px; border-radius:999px; text-transform:uppercase;}
  .badge-ok{background:var(--success-dim); color:var(--success);}
  .badge-danger{background:var(--danger-dim); color:var(--danger);}
  .badge-dim{background:var(--surface-alt); color:var(--text-dim);}
  .quincenal-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:16px;}
  .quincenal-card{background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px;}
  .quincenal-photos{display:grid; grid-template-columns:repeat(auto-fill, minmax(56px,1fr)); gap:6px; margin-top:6px;}
  .quincenal-photos img{width:100%; height:56px; object-fit:cover; border-radius:6px; border:1px solid var(--border);}
  .panel-row{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  const SUPABASE_URL = 'https://jxjevmykipkxdfdczznt.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amV2bXlraXBreGRmZGN6em50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MzA4MzQsImV4cCI6MjA5NzQwNjgzNH0.zJbYDqJi1YcbbxHMz6DFXdMxWhF4k_WxPcuj4dXmeX0';

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const ESTADOS_NO_OK = ['nc', 'observacion', 'falla'];
  function esNoOk(estado){ return ESTADOS_NO_OK.includes(String(estado).toLowerCase()); }

  let state = {
    tab: 'resumen', vehiculos: [], choferes: [], dataBoot: false,
    kpis: null, alertasNC: [], resumenLoading: false,
    turnos: [], turnosLoading: false, turnosFiltro: { vehiculo:'', estado:'', desde:'', hasta:'' },
    gastos: [], gastosLoading: false, gastosFiltro: { vehiculo:'', tipo:'' },
    quincenal: [], quincenalLoading: false,
    detalleTurnoId: null, detalle: null, detalleLoading: false
  };

  function setState(patch){ state = Object.assign({}, state, patch); render(); }
  function setField(obj, key, value){ state = Object.assign({}, state, { [obj]: Object.assign({}, state[obj], { [key]: value }) }); }

  function fmtNum(n){ return Number(n||0).toLocaleString('es-CL'); }
  function fmtMoney(n){ return '$' + Number(n||0).toLocaleString('es-CL'); }
  function fmtFecha(iso){ if (!iso) return '—'; const d = new Date(iso); return d.toLocaleDateString('es-CL') + ' ' + d.toLocaleTimeString('es-CL', {hour:'2-digit', minute:'2-digit'}); }
  function fmtFechaCorta(iso){ if (!iso) return '—'; return new Date(iso).toLocaleDateString('es-CL'); }

  async function initAdminDirecto(){
    const [{ data: vehiculos }, { data: choferes }] = await Promise.all([
      supabase.from('vehiculos').select('*').order('patente'),
      supabase.from('usuarios').select('*').eq('rol', 'chofer').order('nombre'),
    ]);
    state.vehiculos = vehiculos || [];
    state.choferes = choferes || [];
    state.dataBoot = true;
    cargarResumen();
  }

  async function cargarResumen(){
    setState({ resumenLoading:true });
    try {
      const [abiertos, totalNC] = await Promise.all([
        supabase.from('turnos').select('id', { count:'exact', head:true }).eq('estado','abierto'),
        supabase.from('inspeccion_respuestas').select('id', { count:'exact', head:true }).in('estado', ['nc', 'NC'])
      ]);
      const { data: fallas } = await supabase
        .from('inspeccion_respuestas').select('*, checklist_items(nombre), checklists_realizados(turno_id, vehiculos(patente), usuarios(nombre))')
        .in('estado', ['nc', 'NC']).order('id', { ascending: false }).limit(10);

      setState({
        resumenLoading:false,
        kpis: { abiertos: abiertos.count || 0, discrepancy: totalNC.count || 0 },
        alertasNC: fallas || []
      });
    } catch(e){ setState({ resumenLoading:false }); }
  }

  async function cargarTurnos(){
    setState({ turnosLoading:true });
    const f = state.turnosFiltro;
    let q = supabase.from('turnos').select('*, usuarios(nombre), vehiculos(patente,marca,modelo)').order('fecha_inicio',{ascending:false});
    if (f.vehiculo) q = q.eq('vehiculo_id', f.vehiculo);
    if (f.estado) q = q.eq('estado', f.estado);
    const { data } = await q;
    setState({ turnosLoading:false, turnos: data || [] });
  }

  async function cargarGastos(){
    setState({ gastosLoading:true });
    const f = state.gastosFiltro;
    let q = supabase.from('gastos').select('*, vehiculos(patente,marca,modelo)').order('fecha',{ascending:false});
    if (f.vehiculo) q = q.eq('vehiculo_id', f.vehiculo);
    if (f.tipo) q = q.eq('tipo', f.tipo);
    const { data } = await q;
    setState({ gastosLoading:false, gastos: data || [] });
  }

  async function cargarQuincenal(){
    setState({ quincenalLoading:true });
    const { data } = await supabase.from('registro_fotografico_quincenal').select('*, vehiculos(patente), usuarios(nombre)').order('fecha_registro', { ascending:false });
    setState({ quincenalLoading:false, quincenal: data || [] });
  }

  async function abrirDetalleTurno(turnoId){
    if(!turnoId) return;
    setState({ detalleTurnoId: turnoId, detalle:null, detalleLoading:true });
    try {
      const [{ data: turno }, { data: checklists }, { data: viajes }, { data: gastos }] = await Promise.all([
        supabase.from('turnos').select('*, usuarios(nombre), vehiculos(patente,marca,modelo)').eq('id', turnoId).single(),
        supabase.from('checklists_realizados').select('*').eq('turno_id', turnoId).order('momento'),
        supabase.from('viajes_bodega').select('*').eq('turno_id', turnoId).order('hora_salida_bodega'),
        supabase.from('gastos').select('*').eq('turno_id', turnoId).order('fecha'),
      ]);
      const checklistsConRespuestas = [];
      for (const c of (checklists || [])){
        const { data: respuestas } = await supabase.from('inspeccion_respuestas').select('*, checklist_items(nombre,categoria)').eq('checklist_id', c.id);
        checklistsConRespuestas.push({ checklist: c, respuestas: respuestas || [] });
      }
      setState({ detalleLoading:false, detalle: { turno, checklists: checklistsConRespuestas, viajes: viajes || [], gastos: gastos || [] } });
    } catch(e){ setState({ detalleLoading:false }); }
  }

  function render(){
    const app = document.getElementById('app');
    app.innerHTML = `
      <div class="shell">
        <div class="sidebar">
          <div class="brand"><div class="eyebrow">Flota · Privado</div><h1>Panel Admin</h1></div>
          <div class="nav-item ${state.tab==='resumen'?'active':''}" data-tab="resumen">Resumen y Alertas</div>
          <div class="nav-item ${state.tab==='turnos'?'active':''}" data-tab="turnos">Historial Turnos</div>
          <div class="nav-item ${state.tab==='gastos'?'active':''}" data-tab="gastos">Gastos</div>
          <div class="nav-item ${state.tab==='quincenal'?'active':''}" data-tab="quincenal">Carrocería quincenal</div>
          <div class="nav-item ${state.tab==='flota'?'active':''}" data-tab="flota">Camiones y choferes</div>
        </div>
        <div class="content">
          <div class="content-head"><h2>Panel de Control Directo</h2></div>
          ${tabBody()}
        </div>
      </div>
      ${state.detalleTurnoId ? drawerDetalleTurno() : ''}
    `;
    bindEvents();
  }

  function tabBody(){
    if (state.tab === 'resumen') {
      return `
        <div class="kpi-grid">
          <div class="kpi ok"><div class="kpi-label">Turnos abiertos</div><div class="kpi-value">${state.kpis ? state.kpis.abiertos : '…'}</div></div>
          <div class="kpi warn"><div class="kpi-label">Alertas NC Totales</div><div class="kpi-value">${state.kpis ? state.kpis.discrepancy : '…'}</div></div>
        </div>
        <div style="margin-bottom:12px; font-weight:600;">🚨 Alertas Técnicas (NC) Recientes</div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Vehículo</th><th>Chofer</th><th>Ítem</th><th>Comentario</th><th>Foto</th><th>Acción</th></tr></thead>
            <tbody>
              ${state.alertasNC.map(al => `
                <tr>
                  <td class="mono" style="font-weight:700; color:var(--accent);">${al.checklists_realizados?.vehiculos?.patente || '—'}</td>
                  <td>${al.checklists_realizados?.usuarios?.nombre || '—'}</td>
                  <td><b>${al.checklist_items?.nombre || '—'}</b></td>
                  <td style="font-style:italic;">"${al.comentario || 'Sin observaciones'}"</td>
                  <td>${al.foto_url ? `<a href="${al.foto_url}" target="_blank"><img class="thumb" src="${al.foto_url}"></a>` : '—'}</td>
                  <td>${al.checklists_realizados?.turno_id ? `<button class="btn btn-ghost" style="padding:4px 8px; font-size:11px;" data-detalle="${al.checklists_realizados.turno_id}">Ver Turno</button>` : 'Apertura'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }
    if (state.tab === 'turnos') {
      return `
        <div class="filters">
          <select id="f_turno_vehiculo"><option value="">Todos los Camiones</option>${state.vehiculos.map(v => `<option value="${v.id}">${v.patente}</option>`).join('')}</select>
          <button class="btn btn-primary" id="btn-filtrar-turnos">Filtrar</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Camión</th><th>Chofer</th><th>Inicio</th><th>Km</th><th>Estado</th></tr></thead>
            <tbody>
              ${state.turnos.map(t => `<tr class="clickable" data-detalle="${t.id}"><td class="mono">${t.vehiculos?.patente||'—'}</td><td>${t.usuarios?.nombre||'—'}</td><td>${fmtFecha(t.fecha_inicio)}</td><td class="mono">${t.odometro_fin ? (t.odometro_fin - t.odometro_inicio)+' km' : 'En curso'}</td><td>${t.estado}</td></tr>`).join('')}
            </tbody>
          </table>
        </div>
      `;
    }
    if (state.tab === 'gastos') {
      return `
        <div class="table-wrap">
          <table>
            <thead><tr><th>Fecha</th><th>Camión</th><th>Tipo</th><th>Monto</th><th>Boleta</th></tr></thead>
            <tbody>
              ${state.gastos.map(g => `<tr><td>${fmtFechaCorta(g.fecha)}</td><td class="mono">${g.vehiculos?.patente||'—'}</td><td>${g.tipo}</td><td class="mono">${fmtMoney(g.monto)}</td><td>${g.boleta_foto_url ? `<a href="${g.boleta_foto_url}" target="_blank"><img class="thumb" src="${g.boleta_foto_url}"></a>` : '—'}</td></tr>`).join('')}
            </tbody>
          </table>
        </div>
      `;
    }
    if (state.tab === 'quincenal') {
      return `
        <div class="quincenal-grid">
          ${state.quincenal.map(r => `
            <div class="quincenal-card">
              <div class="mono" style="color:var(--accent);">${r.vehiculos?.patente||'—'}</div>
              <div class="dim" style="font-size:11px;">${fmtFecha(r.fecha_registro)} por ${r.usuarios?.nombre||'—'}</div>
              <div class="quincenal-photos">
                ${['fotos_puertas','fotos_parachoques','fotos_focos','fotos_espejos','fotos_costados'].map(k => r[k]?.map(url => `<a href="${url}" target="_blank"><img src="${url}"></a>`).join('') || '').join('')}
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }
    if (state.tab === 'flota') {
      return `
        <div class="panel-row">
          <div class="table-wrap">
            <table><thead><tr><th>Patente</th><th>Marca/Modelo</th></tr></thead><tbody>${state.vehiculos.map(v => `<tr><td class="mono">${v.patente}</td><td>${v.marca} ${v.modelo}</td></tr>`).join('')}</tbody></table>
          </div>
          <div class="table-wrap">
            <table><thead><tr><th>Chofer habilitado</th></tr></thead><tbody>${state.choferes.map(c => `<tr><td>${c.nombre}</td></tr>`).join('')}</tbody></table>
          </div>
        </div>
      `;
    }
  }

  function drawerDetalleTurno() {
    const d = state.detalle; if (!d) return '';
    return `
      <div class="overlay" id="overlay-detalle">
        <div class="drawer">
          <div class="drawer-head"><h3>Resumen Turno ${d.turno.vehiculos?.patente||''}</h3><button class="drawer-close" id="btn-cerrar-detalle">✕</button></div>
          <div class="drawer-section">
            <div class="drawer-section-title">Checklists Evaluados</div>
            ${d.checklists.map(ck => ck.respuestas.map(r => `
              <div class="chk-item">
                <div class="chk-item-top"><span>${r.checklist_items?.nombre||'—'}</span>${esNoOk(r.estado)?'<span class="badge badge-danger">NC</span>':'<span class="badge badge-ok">OK</span>'}</div>
                ${r.comentario ? `<div class="chk-comment"><b>Obs:</b> ${r.comentario}</div>` : ''}
                ${r.foto_url ? `<a class="chk-photo-link" href="${r.foto_url}" target="_blank"><img class="thumb" style="width:60px;height:60px;" src="${r.foto_url}"></a>` : ''}
              </div>
            `).join('')).join('')}
          </div>
        </div>
      </div>
    `;
  }

  function bindEvents(){
    document.querySelectorAll('[data-tab]').forEach(el => el.addEventListener('click', () => {
      setState({ tab: el.dataset.tab });
      if (el.dataset.tab === 'turnos') cargarTurnos();
      if (el.dataset.tab === 'gastos') cargarGastos();
      if (el.dataset.tab === 'quincenal') cargarQuincenal();
    }));
    document.querySelectorAll('[data-detalle]').forEach(el => el.addEventListener('click', (e) => { e.stopPropagation(); abrirDetalleTurno(el.dataset.detalle); }));
    const cDet = document.getElementById('btn-cerrar-detalle'); if (cDet) cDet.addEventListener('click', () => setState({ detalleTurnoId:null, detalle:null }));
  }

  initAdminDirecto();
})();
</script>
</body>
</html>
