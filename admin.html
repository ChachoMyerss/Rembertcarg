<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Administrador | Flota</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script> <style>
        body { font-family: 'Inter', sans-serif; background: #0D0F13; color: #E8EAED; padding: 20px; }
        .card { background: #1E2128; border: 1px solid #333844; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        h1, h2 { color: #FFB020; font-family: 'Oswald', sans-serif; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: #9AA3AF; padding: 12px; border-bottom: 1px solid #333844; }
        td { padding: 12px; border-bottom: 1px solid #333844; }
        .foto-preview { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }
    </style>
</head>
<body>
    <h1>Dashboard de Gestión</h1>
    
    <div class="card">
        <h2>🚨 Alertas de Inspección (NC)</h2>
        <table>
            <thead><tr><th>Vehículo</th><th>Ítem</th><th>Comentario</th><th>Foto</th></tr></thead>
            <tbody id="alertas-body"></tbody>
        </table>
    </div>

    <script>
        const supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

        async function cargarAlertas() {
            const { data } = await supabase
                .from('inspeccion_respuestas')
                .select('comentario, foto_url, checklist_items(nombre), checklists_realizados(vehiculos(patente))')
                .eq('estado', 'nc');
            
            const tbody = document.getElementById('alertas-body');
            tbody.innerHTML = data.map(al => `
                <tr>
                    <td>${al.checklists_realizados.vehiculos.patente}</td>
                    <td>${al.checklist_items.nombre}</td>
                    <td>${al.comentario || 'Sin comentario'}</td>
                    <td>${al.foto_url ? `<img src="${al.foto_url}" class="foto-preview">` : '-'}</td>
                </tr>
            `).join('');
        }
        
        cargarAlertas();
    </script>
</body>
</html>
