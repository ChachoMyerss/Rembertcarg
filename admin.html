<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RembertCarg — Panel Admin</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
    --bg:#14161A;
    --surface:#1E2128;
    --surface-alt:#262A33;
    --border:#333844;
    --text:#E8EAED;
    --text-dim:#9AA3AF;
    --accent:#FFB020;
    --accent-dim:#3A2E14;
    --success:#3DDC84;
    --success-dim:#173327;
    --danger:#FF5C5C;
    --danger-dim:#3A1B1B;
    --warning:#FFD166;
    --warning-dim:#3A2F13;
    --blue:#3B82F6;
    --blue-dim:#1E3A8A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; padding:0; background:var(--bg);}
  body{color:var(--text); font-family:'Inter',sans-serif;}
  h1,h2,h3{font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.5px; margin:0;}
  a{color:var(--accent);}
  .eyebrow{font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:var(--accent); font-weight:600;}

  /* ---------- Shell ---------- */
  #app{min-height:100vh;}
  .shell{display:flex; min-height:100vh;}
  .sidebar{
    width:240px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border);
    padding:22px 16px; display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow-y:auto;
  }
  .brand{margin-bottom:26px;}
  .brand h1{font-size:17px; margin-top:4px; color:var(--accent);}
  
  .nav-group{font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); margin:18px 0 6px 12px; font-weight:700;}
  .nav-item{
    display:flex; align-items:center; gap:10px;
    font-family:'Oswald',sans-serif; font-size:13px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase;
    color:var(--text-dim); padding:10px 12px; border-radius:8px; cursor:pointer; margin-bottom:2px;
  }
  .nav-item:hover{background:var(--surface-alt); color:var(--text);}
  .nav-item.active{background:var(--accent-dim); color:var(--accent);}
  
  .sidebar-footer{margin-top:auto; padding-top:16px; border-top:1px solid var(--border);}
  .user-tag{font-size:12px; color:var(--text-dim); margin-bottom:10px;}
  .user-tag b{color:var(--text); display:block; font-size:13px;}
  
  .main-area{flex:1; display:flex; flex-direction:column; min-width:0; padding-bottom: 40px;}
  
  /* ---------- Global Filter Bar ---------- */
  .global-filter-bar{
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:14px 32px; display:flex; justify-content:space-between; align-items:center;
    position:sticky; top:0; z-index:10;
  }
  .global-filter-bar .filter-group{display:flex; gap:12px; align-items:center;}
  .global-filter-bar label{margin-bottom:0; font-size:11px; text-transform:uppercase; font-weight:600; color:var(--text-dim);}
  .global-filter-bar input[type=date]{background:#0D0F13; border:1px solid var(--border); color:var(--text); padding:6px 10px; border-radius:6px; font-family:'JetBrains Mono',monospace; font-size:13px;}
  
  .content{padding:28px 32px; max-width:1400px;}
  .content-head{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:20px; flex-wrap:wrap; gap:12px;}
  .content-head h2{font-size:22px;}

  /* ---------- Botones / inputs ---------- */
  .btn{
    font-family:'Oswald',sans-serif; font-size:13px; font-weight:600; letter-spacing:0.8px; text-transform:uppercase;
    padding:10px 16px; border-radius:8px; border:none; cursor:pointer; transition:transform .08s;
  }
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--accent); color:#1A1300;}
  .btn-primary:disabled{background:#4A4330; color:#8A8270; cursor:not-allowed;}
  .btn-ghost{background:transparent; border:1px solid var(--border); color:var(--text);}
  
  label{display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px; letter-spacing:0.3px;}
  input[type=text], input[type=number], input[type=email], input[type=password], input[type=date], select{
    background:#0D0F13; border:1px solid var(--border); color:var(--text);
    font-family:'JetBrains Mono',monospace; font-size:14px; padding:9px 12px; border-radius:8px; width:100%;
  }
  select{font-family:'Inter',sans-serif;}
  input:focus, select:focus{outline:2px solid var(--accent); border-color:transparent;}
  .filters{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; align-items:flex-end;}
  .filter-field{display:flex; flex-direction:column; gap:0;}

  /* ---------- Cards / KPIs ---------- */
  .card{background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:18px;}
  .kpi-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(220px,1fr)); gap:16px; margin-bottom:24px;}
  .kpi{background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px; display:flex; flex-direction:column; justify-content:center;}
  .kpi-label{font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--text-dim); font-family:'Oswald',sans-serif; margin-bottom:4px;}
  .kpi-value{font-family:'JetBrains Mono',monospace; font-size:32px; font-weight:700; line-height:1;}
  .kpi.warn .kpi-value{color:var(--warning);}
  .kpi.danger .kpi-value{color:var(--danger);}
  .kpi.ok .kpi-value{color:var(--success);}
  .kpi-sub{font-size:12px; color:var(--text-dim); margin-top:8px;}
  
  .chart-grid{display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-bottom:24px;}
  @media (max-width: 1000px){ .chart-grid{grid-template-columns:1fr;} }
  .chart-card{background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px;}
  .chart-title{font-size:13px; font-weight:600; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center;}

  /* ---------- Kanban Board Drag & Drop ---------- */
  .kanban-board { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 10px; align-items: flex-start;}
  .kanban-col { background: var(--surface-alt); border-radius: 10px; width: 320px; flex-shrink: 0; display: flex; flex-direction: column; min-height: 200px; max-height: 70vh; border: 2px dashed transparent; transition: border-color 0.2s;}
  .kanban-col.drag-over { border-color: var(--accent); }
  .kanban-header { padding: 14px 16px; border-bottom: 1px solid var(--border); font-family: 'Oswald', sans-serif; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; }
  .kanban-body { padding: 16px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 12px; min-height:100px;}
  
  .ticket-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; cursor: grab; transition: border-color 0.2s; position:relative; }
  .ticket-card:hover { border-color: var(--text-dim); }
  .ticket-card:active { cursor: grabbing; }
  .ticket-card .t-patente { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .ticket-card .t-falla { font-size: 14px; font-weight: 600; color: var(--danger); margin-bottom: 8px; }
  .ticket-card .t-desc { font-size: 12px; color: var(--text-dim); margin-bottom: 10px; line-height: 1.4; }
  .ticket-card .t-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); }

  /* ---------- Badges ---------- */
  .badge{
    display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; letter-spacing:0.4px;
    padding:4px 9px; border-radius:999px; text-transform:uppercase; white-space:nowrap;
  }
  .badge-ok{background:var(--success-dim); color:var(--success);}
  .badge-warn{background:var(--warning-dim); color:var(--warning);}
  .badge-danger{background:var(--danger-dim); color:var(--danger);}
  .badge-dim{background:var(--surface-alt); color:var(--text-dim);}
  .badge-blue{background:var(--blue-dim); color:var(--blue);}

  /* ---------- Tabla ---------- */
  .table-wrap{background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  thead th{
    text-align:left; font-family:'Oswald',sans-serif; font-size:10px; letter-spacing:1px; text-transform:uppercase;
    color:var(--text-dim); padding:12px 14px; border-bottom:1px solid var(--border); background:var(--surface-alt);
  }
  tbody td{padding:11px 14px; border-bottom:1px solid var(--border); vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr.clickable{cursor:pointer;}
  tbody tr.clickable:hover{background:var(--surface-alt);}
  .mono{font-family:'JetBrains Mono',monospace;}
  .dim{color:var(--text-dim);}
  .panel-row{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px;}
  @media (max-width: 900px){ .panel-row{grid-template-columns:1fr;} }
  .panel-title{font-size:13px; font-weight:600; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;}

  /* ---------- Drawer y Fotos ---------- */
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:20; display:flex; justify-content:flex-end;}
  .drawer{width:100%; max-width:560px; background:var(--bg); border-left:1px solid var(--border); height:100vh; overflow-y:auto; padding:24px 26px;}
  .drawer-head{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px;}
  .drawer-close{background:var(--surface-alt); border:1px solid var(--border); color:var(--text); width:32px; height:32px; border-radius:8px; cursor:pointer;}
  .drawer-section{margin-bottom:22px;}
  .drawer-section-title{font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); font-family:'Oswald',sans-serif; margin-bottom:10px;}
  .meta-row{display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--border); font-size:13px;}
  .meta-row span:last-child{font-family:'JetBrains Mono',monospace; font-weight:600;}
  .chk-item{background:var(--surface); border:1px solid var(--border); border-radius:9px; padding:12px 14px; margin-bottom:8px;}
  .chk-item-top{display:flex; justify-content:space-between; align-items:center; gap:8px;}
  .chk-item-name{font-size:13px;}
  .chk-comment{font-size:12px; color:var(--text-dim); margin-top:6px;}
  .log-item{background:var(--surface); border:1px solid var(--border); border-radius:9px; padding:11px 14px; margin-bottom:8px; font-size:13px;}
  .log-item .log-top{display:flex; justify-content:space-between;}
  .log-item .dim{font-size:12px;}
  .thumb{width:40px; height:40px; object-fit:cover; border-radius:6px; border:1px solid var(--border); display:block;}
  .odo-photos{display:flex; gap:8px; margin-top:10px;}
  .odo-photos a{display:block; width:80px; height:80px;}
  .odo-photos img{width:100%; height:100%; object-fit:cover; border-radius:8px; border:1px solid var(--border);}
  .chk-photo-link{display:inline-block; margin-top:8px;}
  .chk-photo-link img{width:60px; height:60px; object-fit:cover; border-radius:6px; border:1px solid var(--border);}

  /* Loading & Errors */
  .spinner{width:26px; height:26px; border-radius:50%; border:3px solid var(--border); border-top-color:var(--accent); animation:spin .8s linear infinite; margin:0 auto 10px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .empty-state{text-align:center; padding:40px 10px; color:var(--text-dim); font-size:13px;}
  .load-row{text-align:center; padding:30px; color:var(--text-dim); font-size:13px;}
  .login-screen{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;}
  .login-box{width:100%; max-width:340px;}
  .login-box .card{background:var(--surface); padding:28px 24px; border:1px solid var(--border); border-radius:10px;}
  .login-error{background:var(--danger-dim); border:1px solid var(--danger); color:var(--danger); padding:10px 12px; border-radius:8px; font-size:13px; margin-bottom:14px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  // =====================================================================
  // CONFIGURACIÓN DE SUPABASE
  // =====================================================================
  const SUPABASE_URL = 'https://jxjevmykipkxdfdczznt.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4amV2bXlraXBreGRmZGN6em50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MzA4MzQsImV4cCI6MjA5NzQwNjgzNH0.zJbYDqJi1YcbbxHMz6DFXdMxWhF4k_WxPcuj4dXmeX0';

  const ADMIN_EMAIL = 'carol@rembercarg.com';
  const ADMIN_PASSWORD = 'rembercarg2026';

  const supabase = (window.supabase && SUPABASE_URL.indexOf('TU-PROYECTO') === -1)
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    : null;

  const ESTADOS_NO_OK = ['nc', 'observacion', 'falla'];
  function esNoOk(estado){ return ESTADOS_NO_OK.includes(estado); }

  let chartGerenciaInstance = null;
  let chartTopCostosInstance = null;
  let chartRendimientoInstance = null;

  // Establecer el mes actual para el filtro global por defecto
  const hoy = new Date();
  const primerDiaMes = new Date(hoy.getFullYear(), hoy.getMonth(), 1).toISOString().split('T')[0];
  const ultimoDiaMes = new Date(hoy.getFullYear(), hoy.getMonth() + 1, 0).toISOString().split('T')[0];

  let state = {
    booting: true,
    perfil: null,
    accessDenied: false,
    authError: null,
    configError: !supabase,

    tab: 'gerencia', // Nueva pestaña principal por defecto
    
    // Filtro Global
    filtroGlobal: { desde: primerDiaMes, hasta: ultimoDiaMes },

    vehiculos: [],
    choferes: [],
    dataBoot: false,
    
    // Almacena datos transversales calculados en el dashboard
    datosPeriodo: {
        ingresoCalculado: 0,
        horasCalculadas: 0,
        totalCombustible: 0,
        // ...
    },
    dashboardLoading: false,

    turnos: [],
    turnosLoading: false,
    turnosFiltro: { vehiculo:'', chofer:'', estado:'', desde:'', hasta:'' }, 

    gastos: [],
    gastosLoading: false,
    gastosFiltro: { vehiculo:'', tipo:'', soloSospechosos:false },

    kanbanData: {
      Pendiente: [],
      'En Reparación': [],
      Resuelto: []
    },
    tallerLoading: false,

    detalleTurnoId: null,
    detalle: null,
    detalleLoading: false,
    
    // Inputs extras temporales para Gerencia
    ingresoExtraManual: 0,
    nombreIngresoExtra: 'Bono / Otros',
  };

  function setState(patch){ state = Object.assign({}, state, patch); scheduleRender(); }
  function setField(obj, key, value){ state = Object.assign({}, state, { [obj]: Object.assign({}, state[obj], { [key]: value }) }); scheduleRender(); }

  let renderScheduled = false;
  function scheduleRender(){
    if (renderScheduled) return;
    renderScheduled = true;
    Promise.resolve().then(() => { renderScheduled = false; render(); });
  }

  // =====================================================================
  // FORMATOS Y UTILIDADES
  // =====================================================================
  function fmtNum(n){ return Number(n||0).toLocaleString('es-CL'); }
  function fmtMoney(n){ return '$' + Number(n||0).toLocaleString('es-CL'); }
  function fmtFecha(iso){
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('es-CL', { day:'2-digit', month:'2-digit', year:'numeric' }) + ' ' +
           d.toLocaleTimeString('es-CL', { hour:'2-digit', minute:'2-digit' });
  }
  function fmtFechaCorta(iso){
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('es-CL', { day:'2-digit', month:'2-digit', year:'numeric' });
  }
  
  function renderThumbnails(urlStr) {
    if(!urlStr) return '<span class="dim">—</span>';
    return urlStr.split(',').filter(Boolean).map(u => `<a href="${u}" target="_blank"><img class="thumb" style="display:inline-block; margin-right:4px;" src="${u}"></a>`).join('');
  }
  function renderDrawerChecklistPhotos(urlStr) {
    if(!urlStr) return '';
    return urlStr.split(',').filter(Boolean).map(u => `<a class="chk-photo-link" href="${u}" target="_blank"><img src="${u}"></a>`).join('');
  }

  const TIPO_GASTO_LABEL = { combustible:'Combustible', peaje:'Peaje', mantencion:'Mantención', neumaticos:'Neumáticos', otro:'Otro' };
  const ESTADO_TURNO_BADGE = {
    abierto: '<span class="badge badge-ok">● Abierto</span>',
    cerrado: '<span class="badge badge-dim">Cerrado</span>',
    con_discrepancia: '<span class="badge badge-warn">△ Discrepancia</span>',
  };

  // =====================================================================
  // INICIALIZACIÓN Y SYNC
  // =====================================================================
  async function boot(){
    if (!supabase){ setState({ booting:false }); return; }
    const { data } = await supabase.auth.getSession();
    if (data && data.session){
      await cargarPerfil();
      return;
    }
    const { error: signInErr } = await supabase.auth.signInWithPassword({ email: ADMIN_EMAIL, password: ADMIN_PASSWORD });
    if (signInErr){
      setState({ booting:false, accessDenied:true, authError: 'No se pudo autenticar el panel: ' + signInErr.message });
      return;
    }
    await cargarPerfil();
  }

  async function cargarPerfil(){
    try {
      const { data: authData } = await supabase.auth.getUser();
      const { data: perfil } = await supabase.from('usuarios').select('id, nombre, rol').eq('auth_user_id', authData.user.id).maybeSingle();
      if (!perfil){ setState({ booting:false, accessDenied:true, authError:'La cuenta admin no está vinculada.' }); return; }
      
      setState({ booting:false, perfil, accessDenied:false });
      
      await sincronizarNCaTaller();
      await cargarDatosBase();
      cargarDatosTabActual();
    } catch(e){
      setState({ booting:false, accessDenied:true, authError: e.message });
    }
  }

  async function sincronizarNCaTaller() {
    try {
      const { data: ncs } = await supabase.from('inspeccion_respuestas')
        .select('id, comentario, checklist_items(nombre, categoria), checklists_realizados(vehiculo_id)')
        .in('estado', ESTADOS_NO_OK);
      
      if(!ncs || ncs.length === 0) return;
      const { data: tickets } = await supabase.from('tickets_taller').select('respuesta_origen_id').not('respuesta_origen_id', 'is', null);
      const ticketIds = new Set((tickets || []).map(t => t.respuesta_origen_id));

      const nuevosTickets = [];
      for (let nc of ncs) {
        if (!ticketIds.has(nc.id) && nc.checklists_realizados?.vehiculo_id) {
          nuevosTickets.push({
            vehiculo_id: nc.checklists_realizados.vehiculo_id,
            respuesta_origen_id: nc.id,
            categoria: nc.checklist_items?.categoria || 'General',
            descripcion: nc.comentario || ('Falla en: ' + (nc.checklist_items?.nombre || 'Elemento')),
            estado: 'Pendiente'
          });
        }
      }
      if (nuevosTickets.length > 0) await supabase.from('tickets_taller').insert(nuevosTickets);
    } catch (e) { console.error("Error sincronizando taller:", e); }
  }

  async function cargarDatosBase(){
    const [{ data: vehiculos }, { data: choferes }] = await Promise.all([
      supabase.from('vehiculos').select('*').order('patente'),
      supabase.from('usuarios').select('*').eq('rol', 'chofer').order('nombre'),
    ]);
    setState({ vehiculos: vehiculos || [], choferes: choferes || [], dataBoot:true });
  }

  function cargarDatosTabActual(){
    if (state.tab === 'gerencia' || state.tab === 'operacion' || state.tab === 'costos') cargarDatosGlobales();
    if (state.tab === 'taller') cargarTallerKanban();
    if (state.tab === 'turnos') cargarTurnos();
    if (state.tab === 'gastos') cargarGastos();
  }

  // =====================================================================
  // MOTOR MATEMÁTICO: GERENCIA Y OPERACIÓN
  // =====================================================================
  function calcularIngresosExactos(desdeStr, hastaStr) {
      // Regla de Negocio: 24h los viernes, 22h resto de días. a 8250 la hora.
      let d = new Date(desdeStr + 'T00:00:00');
      let end = new Date(hastaStr + 'T23:59:59');
      let totalHoras = 0;
      
      while(d <= end) {
          // getDay() 0=Sun, 1=Mon, 2=Tue, 3=Wed, 4=Thu, 5=Fri, 6=Sat
          if(d.getDay() === 5) totalHoras += 24; 
          else totalHoras += 22;
          d.setDate(d.getDate() + 1);
      }
      return { horas: totalHoras, ingresoBase: totalHoras * 8250 };
  }

  async function cargarDatosGlobales(){
    setState({ dashboardLoading:true });
    try {
      const fD = state.filtroGlobal.desde + 'T00:00:00';
      const fH = state.filtroGlobal.hasta + 'T23:59:59';

      const [{ data: turnos }, { data: viajes }, { data: gastos }] = await Promise.all([
        supabase.from('turnos').select('*, vehiculos(patente), usuarios(id, nombre)').gte('fecha_inicio', fD).lte('fecha_inicio', fH).order('fecha_inicio',{ascending:false}),
        supabase.from('viajes_bodega').select('*').gte('hora_salida_bodega', fD).lte('hora_salida_bodega', fH),
        supabase.from('gastos').select('*').gte('fecha', fD).lte('fecha', fH)
      ]);

      // --- CÁLCULO DE INGRESOS ---
      const calculoDinero = calcularIngresosExactos(state.filtroGlobal.desde, state.filtroGlobal.hasta);
      
      // --- CÁLCULO DE COSTOS DIRECTOS (Gastos) ---
      let totalCombustible = 0;
      let totalPeajes = 0;
      let totalMantenimiento = 0;
      (gastos || []).forEach(g => {
         const m = parseFloat(g.monto) || 0;
         if(g.tipo === 'combustible') totalCombustible += m;
         else if(g.tipo === 'peaje') totalPeajes += m;
         else totalMantenimiento += m;
      });
      // (Los sueldos y arriendos los simulamos temporalmente hasta cruzar con la BD Financiera que creamos)
      const costoSueldosFijos = 1800000; 
      const costoArriendosFijos = 1200000;
      const costoTotalMes = totalCombustible + totalPeajes + totalMantenimiento + costoSueldosFijos + costoArriendosFijos;

      // --- CÁLCULO OPERACIONAL (Choferes, Km, Carga) ---
      let kmTotales = 0;
      const choferStats = {}; 

      (turnos || []).forEach(t => {
        const dist = (t.odometro_fin != null) ? (t.odometro_fin - t.odometro_inicio) : 0;
        kmTotales += dist;

        if(t.usuarios) {
          if(!choferStats[t.usuarios.id]) choferStats[t.usuarios.id] = { nombre: t.usuarios.nombre, km: 0, turnos: 0 };
          choferStats[t.usuarios.id].km += dist;
          choferStats[t.usuarios.id].turnos += 1;
        }
      });

      let totalScooters = 0;
      let totalBaterias = 0;
      (viajes || []).forEach(v => {
        totalScooters += (v.scooters_cargados || 0);
        totalBaterias += (v.baterias_cargadas || 0);
      });

      // SOLUCIÓN: Ranking basado SÓLO en el menor Kilometraje promedio por turno (Lo más simple)
      const rankingChoferes = Object.values(choferStats)
        .filter(c => c.turnos > 0)
        .map(c => ({ nombre: c.nombre, promKm: c.km / c.turnos }))
        .sort((a,b) => a.promKm - b.promKm) // De menor a mayor (Menos km es mejor)
        .slice(0, 3); 

      setState({
        dashboardLoading: false,
        datosPeriodo: {
          ...calculoDinero,
          totalCombustible, totalPeajes, totalMantenimiento, costoTotalMes, costoSueldosFijos, costoArriendosFijos,
          kmTotales, totalScooters, totalBaterias, rankingChoferes,
          numViajes: (viajes||[]).length,
          turnosRecientes: (turnos || []).slice(0, 5)
        }
      });
      
      setTimeout(renderizarGraficos, 50);
      
    } catch(e){ setState({ dashboardLoading:false }); }
  }

  async function cargarTallerKanban(){
    setState({ tallerLoading: true });
    const { data: tickets } = await supabase.from('tickets_taller').select('*, vehiculos(patente)').order('fecha_reporte', {ascending: false});
    
    const agrupado = { Pendiente: [], 'En Reparación': [], Resuelto: [] };
    (tickets || []).forEach(t => { if(agrupado[t.estado]) agrupado[t.estado].push(t); });
    
    setState({ tallerLoading: false, kanbanData: agrupado });
  }

  async function cargarTurnos(){
    setState({ turnosLoading:true });
    const f = state.turnosFiltro;
    let q = supabase.from('turnos').select('*, usuarios(nombre), vehiculos(patente,marca,modelo)').order('fecha_inicio',{ascending:false}).limit(200);
    
    q = q.gte('fecha_inicio', state.filtroGlobal.desde + 'T00:00:00');
    q = q.lte('fecha_inicio', state.filtroGlobal.hasta + 'T23:59:59');

    if (f.vehiculo) q = q.eq('vehiculo_id', f.vehiculo);
    if (f.chofer) q = q.eq('chofer_id', f.chofer); 
    if (f.estado) q = q.eq('estado', f.estado);

    const { data, error } = await q;
    setState({ turnosLoading:false, turnos: error ? [] : (data || []) });
  }

  async function cargarGastos(){
    setState({ gastosLoading:true });
    const f = state.gastosFiltro;
    let q = supabase.from('gastos').select('*, vehiculos(patente,marca,modelo)').order('fecha',{ascending:false}).limit(300);
    q = q.gte('fecha', state.filtroGlobal.desde + 'T00:00:00');
    q = q.lte('fecha', state.filtroGlobal.hasta + 'T23:59:59');
    if (f.vehiculo) q = q.eq('vehiculo_id', f.vehiculo);
    if (f.tipo) q = q.eq('tipo', f.tipo);
    if (f.soloSospechosos) q = q.eq('es_sospechoso', true);
    
    const { data, error } = await q;
    setState({ gastosLoading:false, gastos: error ? [] : (data || []) });
  }

  async function abrirDetalleTurno(turnoId){
    setState({ detalleTurnoId: turnoId, detalle:null, detalleLoading:true });
    try {
      const [{ data: turno }, { data: checklists }, { data: viajes }, { data: gastos }] = await Promise.all([
        supabase.from('turnos').select('*, usuarios(nombre), vehiculos(patente,marca,modelo,rendimiento_esperado_kml)').eq('id', turnoId).single(),
        supabase.from('checklists_realizados').select('*').eq('turno_id', turnoId).order('momento'),
        supabase.from('viajes_bodega').select('*').eq('turno_id', turnoId).order('hora_salida_bodega'),
        supabase.from('gastos').select('*').eq('turno_id', turnoId).order('fecha'),
      ]);

      const checklistsConRespuestas = [];
      for (const c of (checklists || [])){
        const { data: respuestas } = await supabase.from('inspeccion_respuestas').select('*, checklist_items(nombre,categoria,es_critico)').eq('checklist_id', c.id);
        checklistsConRespuestas.push({ checklist: c, respuestas: respuestas || [] });
      }
      setState({ detalleLoading:false, detalle: { turno, checklists: checklistsConRespuestas, viajes: viajes || [], gastos: gastos || [] } });
    } catch(e){ setState({ detalleLoading:false, detalle: { error: e.message } }); }
  }

  window.kanbanDragStart = function(ev) {
    ev.dataTransfer.setData("ticketId", ev.target.dataset.id);
  };
  window.kanbanAllowDrop = function(ev) {
    ev.preventDefault();
  };
  window.kanbanDrop = async function(ev) {
    ev.preventDefault();
    const ticketId = ev.dataTransfer.getData("ticketId");
    const col = ev.target.closest('.kanban-col');
    if(!col || !ticketId) return;
    
    const nuevoEstado = col.dataset.estado;
    const card = document.querySelector(`[data-id="${ticketId}"]`);
    if(card) col.querySelector('.kanban-body').appendChild(card);

    const { error } = await supabase.from('tickets_taller').update({estado: nuevoEstado}).eq('id', ticketId);
    if(error) { alert("Error moviendo ticket"); cargarTallerKanban(); }
  };

  function renderizarGraficos(){
    Chart.defaults.color = '#9AA3AF';
    Chart.defaults.font.family = "'Inter', sans-serif";

    if(state.tab === 'gerencia'){
       const ctxGerencia = document.getElementById('chartGerencia');
       if(ctxGerencia){
           if(chartGerenciaInstance) chartGerenciaInstance.destroy();
           const d = state.datosPeriodo;
           const ingresoTotal = d.ingresoBase + parseFloat(state.ingresoExtraManual);
           chartGerenciaInstance = new Chart(ctxGerencia, {
             type: 'bar',
             data: {
               labels: ['Ingresos vs Costos'],
               datasets: [
                 { label: 'Ingresos Totales', data: [ingresoTotal], backgroundColor: '#3DDC84', borderRadius: 4 },
                 { label: 'Costos Totales', data: [d.costoTotalMes], backgroundColor: '#FF5C5C', borderRadius: 4 }
               ]
             },
             options: { responsive: true, plugins: { legend: { position: 'bottom' } }, scales: { y: { grid: { color: '#333844' } }, x: { grid: { display: false } } } }
           });
       }
    }

    if(state.tab === 'costos'){
       const ctxCostos = document.getElementById('chartTopCostos');
       if(ctxCostos){
           if(chartTopCostosInstance) chartTopCostosInstance.destroy();
           const d = state.datosPeriodo;
           chartTopCostosInstance = new Chart(ctxCostos, {
             type: 'doughnut',
             data: {
               labels: ['Sueldos', 'Arriendo Equipos', 'Combustible', 'Mantenimiento y Peajes'],
               datasets: [{
                 data: [d.costoSueldosFijos, d.costoArriendosFijos, d.totalCombustible, d.totalMantenimiento + d.totalPeajes],
                 backgroundColor: ['#3B82F6', '#9AA3AF', '#FFB020', '#FF5C5C'],
                 borderWidth: 0
               }]
             },
             options: { responsive: true, plugins: { legend: { position: 'right' } }, cutout: '70%' }
           });
       }
    }
  }

                  <div class="t-desc">"${t.descripcion}"</div>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }

  // ---------- Turnos ----------
  function turnosTab(){
    const f = state.turnosFiltro;
    return `
      <div class="filters">
        <div class="filter-field"><label>Chofer</label>
          <select id="f_turno_chofer">
            <option value="">Todos</option>
            ${state.choferes.map(c => `<option value="${c.id}" ${f.chofer===c.id?'selected':''}>${c.nombre}</option>`).join('')}
          </select>
        </div>
        <div class="filter-field"><label>Camión</label>
          <select id="f_turno_vehiculo">
            <option value="">Todos</option>
            ${state.vehiculos.map(v => `<option value="${v.id}" ${f.vehiculo===v.id?'selected':''}>${v.patente}</option>`).join('')}
          </select>
        </div>
        <div class="filter-field"><label>Estado</label>
          <select id="f_turno_estado">
            <option value="">Todos</option>
            <option value="abierto" ${f.estado==='abierto'?'selected':''}>Abierto</option>
            <option value="cerrado" ${f.estado==='cerrado'?'selected':''}>Cerrado</option>
            <option value="con_discrepancia" ${f.estado==='con_discrepancia'?'selected':''}>Con discrepancia</option>
          </select>
        </div>
        <button class="btn btn-primary" id="btn-filtrar-turnos">Aplicar Filtros Locales</button>
      </div>
      <div class="table-wrap">
        ${state.turnosLoading ? `<div class="load-row"><div class="spinner"></div>Cargando turnos…</div>` : (
          state.turnos.length === 0 ? `<div class="empty-state">No hay turnos para estos filtros.</div>` : `
          <table>
            <thead><tr><th>Camión</th><th>Chofer</th><th>Inicio</th><th>Cierre</th><th>Km</th><th>Estado</th></tr></thead>
            <tbody>
              ${state.turnos.map(t => {
                const km = (t.odometro_fin != null) ? (t.odometro_fin - t.odometro_inicio) : null;
                return `
                  <tr class="clickable" data-detalle="${t.id}">
                    <td class="mono">${t.vehiculos ? t.vehiculos.patente : '—'}</td>
                    <td>${t.usuarios ? t.usuarios.nombre : '—'}</td>
                    <td class="dim">${fmtFecha(t.fecha_inicio)}</td>
                    <td class="dim">${t.fecha_fin ? fmtFecha(t.fecha_fin) : '—'}</td>
                    <td class="mono">${km != null ? fmtNum(km) + ' km' : '—'}</td>
                    <td>${ESTADO_TURNO_BADGE[t.estado] || t.estado}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        `)}
      </div>
    `;
  }

  // ---------- Gastos ----------
  function gastosTab(){
    const f = state.gastosFiltro;
    return `
      <div class="filters">
        <div class="filter-field"><label>Camión</label>
          <select id="f_gasto_vehiculo">
            <option value="">Todos</option>
            ${state.vehiculos.map(v => `<option value="${v.id}" ${f.vehiculo===v.id?'selected':''}>${v.patente}</option>`).join('')}
          </select>
        </div>
        <div class="filter-field"><label>Tipo</label>
          <select id="f_gasto_tipo">
            <option value="">Todos</option>
            ${Object.entries(TIPO_GASTO_LABEL).map(([id,label]) => `<option value="${id}" ${f.tipo===id?'selected':''}>${label}</option>`).join('')}
          </select>
        </div>
        <div class="filter-field" style="flex-direction:row; align-items:center; gap:8px; padding-bottom:9px;">
          <input type="checkbox" id="f_gasto_sospechoso" ${f.soloSospechosos?'checked':''} style="width:auto;">
          <label style="margin:0;">Solo sospechosos</label>
        </div>
        <button class="btn btn-primary" id="btn-filtrar-gastos">Filtrar Facturas</button>
      </div>
      <div class="table-wrap">
        ${state.gastosLoading ? `<div class="load-row"><div class="spinner"></div>Cargando gastos…</div>` : (
          state.gastos.length === 0 ? `<div class="empty-state">No hay gastos para estos filtros.</div>` : `
          <table>
            <thead><tr><th>Fecha</th><th>Camión</th><th>Tipo</th><th>Monto</th><th>Litros</th><th>Rendimiento tramo</th><th>Estado</th><th>Boleta</th></tr></thead>
            <tbody>
              ${state.gastos.map(g => `
                <tr>
                  <td class="dim">${fmtFechaCorta(g.fecha)}</td>
                  <td class="mono">${g.vehiculos ? g.vehiculos.patente : '—'}</td>
                  <td>${TIPO_GASTO_LABEL[g.tipo] || g.tipo}</td>
                  <td class="mono">${fmtMoney(g.monto)}</td>
                  <td class="mono">${g.litros ? g.litros + ' L' : '—'}</td>
                  <td class="mono">${g.rendimiento_tramo_kml ? g.rendimiento_tramo_kml + ' km/L' : '—'}</td>
                  <td>${g.es_sospechoso ? '<span class="badge badge-danger">Sospechoso</span>' : (g.aprobado ? '<span class="badge badge-ok">Aprobado</span>' : '<span class="badge badge-dim">Pendiente</span>')}</td>
                  <td>${renderThumbnails(g.boleta_foto_url)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `)}
      </div>
    `;
  }

  // ---------- Camiones y choferes ----------
  function flotaTab(){
    return `
      <div class="panel-row">
        <div>
          <div class="panel-title">Camiones (${state.vehiculos.length})</div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Patente</th><th>Modelo</th><th>Estanque</th><th>Estado</th></tr></thead>
              <tbody>
                ${state.vehiculos.map(v => `
                  <tr>
                    <td class="mono">${v.patente}</td>
                    <td>${[v.marca, v.modelo].filter(Boolean).join(' ') || '—'}</td>
                    <td class="mono">${v.capacidad_estanque_l ? v.capacidad_estanque_l + ' L' : '—'}</td>
                    <td>${v.activo ? '<span class="badge badge-ok">Activo</span>' : '<span class="badge badge-dim">Inactivo</span>'}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
        <div>
          <div class="panel-title">Choferes (${state.choferes.length})</div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Nombre</th><th>RUT</th><th>Teléfono</th><th>Estado</th></tr></thead>
              <tbody>
                ${state.choferes.map(c => `
                  <tr>
                    <td>${c.nombre}</td>
                    <td class="mono">${c.rut || '—'}</td>
                    <td class="mono">${c.telefono || '—'}</td>
                    <td>${c.activo ? '<span class="badge badge-ok">Activo</span>' : '<span class="badge badge-dim">Inactivo</span>'}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    `;
  }

  // ---------- Drawer detalle de turno ----------
  function drawerDetalleTurno(){
    if (state.detalleLoading) return `<div class="overlay" id="overlay-detalle"><div class="drawer"><div class="load-row"><div class="spinner"></div>Cargando detalle…</div></div></div>`;
    const d = state.detalle;
    if (!d || d.error) return `<div class="overlay" id="overlay-detalle"><div class="drawer"><div class="login-error">⚠ ${d ? d.error : 'Error desconocido'}</div></div></div>`;
    
    const t = d.turno;
    const km = t.odometro_fin != null ? (t.odometro_fin - t.odometro_inicio) : null;
    const totalGastos = d.gastos.reduce((s,g) => s + (parseFloat(g.monto)||0), 0);

    return `
      <div class="overlay" id="overlay-detalle">
        <div class="drawer">
          <div class="drawer-head">
            <div>
              <div class="eyebrow">Detalle de turno</div>
              <h2 style="font-size:19px; margin-top:4px;">${t.vehiculos ? t.vehiculos.patente : '—'}</h2>
            </div>
            <button class="drawer-close" id="btn-cerrar-detalle">✕</button>
          </div>

          <div class="drawer-section">
            <div class="drawer-section-title">Datos del turno</div>
            <div class="meta-row"><span>Chofer</span><span>${t.usuarios ? t.usuarios.nombre : '—'}</span></div>
            <div class="meta-row"><span>Inicio</span><span>${fmtFecha(t.fecha_inicio)}</span></div>
            <div class="meta-row"><span>Cierre</span><span>${t.fecha_fin ? fmtFecha(t.fecha_fin) : '—'}</span></div>
            <div class="meta-row"><span>Odómetro inicio</span><span>${fmtNum(t.odometro_inicio)} km</span></div>
            <div class="meta-row"><span>Odómetro fin</span><span>${t.odometro_fin != null ? fmtNum(t.odometro_fin) + ' km' : '—'}</span></div>
            <div class="meta-row"><span>Km recorridos</span><span>${km != null ? fmtNum(km) + ' km' : '—'}</span></div>
            <div class="meta-row"><span>Estado</span><span>${ESTADO_TURNO_BADGE[t.estado] || t.estado}</span></div>
            ${(t.foto_odometro_inicio_url || t.foto_odometro_fin_url) ? `
              <div class="odo-photos">
                ${t.foto_odometro_inicio_url ? t.foto_odometro_inicio_url.split(',').filter(Boolean).map(u => `<a href="${u}" target="_blank"><img src="${u}"></a>`).join('') : ''}
                ${t.foto_odometro_fin_url ? t.foto_odometro_fin_url.split(',').filter(Boolean).map(u => `<a href="${u}" target="_blank"><img src="${u}"></a>`).join('') : ''}
              </div>
            ` : ''}
          </div>

          ${d.checklists.map(ck => `
            <div class="drawer-section">
              <div class="drawer-section-title">Checklist ${ck.checklist.momento.toUpperCase()}</div>
              ${ck.respuestas.length === 0 ? `<div class="dim" style="font-size:13px;">Sin respuestas registradas.</div>` : ck.respuestas.map(r => `
                <div class="chk-item">
                  <div class="chk-item-top">
                    <div class="chk-item-name">${r.checklist_items ? r.checklist_items.nombre : '—'}</div>
                    ${esNoOk(r.estado) ? '<span class="badge badge-warn">NC</span>' : '<span class="badge badge-ok">OK</span>'}
                  </div>
                  ${r.comentario ? `<div class="chk-comment">${r.comentario}</div>` : ''}
                  <div style="margin-top:4px;">${renderDrawerChecklistPhotos(r.foto_url)}</div>
                </div>
              `).join('')}
            </div>
          `).join('')}

          <div class="drawer-section">
            <div class="drawer-section-title">Viajes a bodega (${d.viajes.length})</div>
            ${d.viajes.length === 0 ? `<div class="dim" style="font-size:13px;">Sin viajes registrados.</div>` : d.viajes.map(v => {
              const kmv = (v.odometro_regreso != null) ? (v.odometro_regreso - v.odometro_salida) : null;
              return `
                <div class="log-item">
                  <div class="log-top"><span>${v.scooters_cargados||0} scooters · ${v.baterias_cargadas||0} baterías</span><span class="mono">${kmv != null ? kmv + ' km' : '—'}</span></div>
                  <div class="dim">${fmtFecha(v.hora_salida_bodega)}</div>
                </div>
              `;
            }).join('')}
          </div>

          <div class="drawer-section">
            <div class="drawer-section-title">Gastos del turno (${d.gastos.length}) — total ${fmtMoney(totalGastos)}</div>
            ${d.gastos.length === 0 ? `<div class="dim" style="font-size:13px;">Sin gastos registrados.</div>` : d.gastos.map(g => `
              <div class="log-item">
                <div class="log-top">
                  <span>${TIPO_GASTO_LABEL[g.tipo] || g.tipo}</span>
                  <span class="mono">${fmtMoney(g.monto)}</span>
                </div>
                ${g.litros ? `<div class="dim">${g.litros} L${g.rendimiento_tramo_kml ? ' · ' + g.rendimiento_tramo_kml + ' km/L' : ''}${g.es_sospechoso ? ' · <span style="color:var(--danger);">sospechoso</span>' : ''}</div>` : ''}
                <div style="margin-top:4px;">${renderDrawerChecklistPhotos(g.boleta_foto_url)}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    `;
  }

  // =====================================================================
  // EVENTOS UI
  // =====================================================================
  function bindEvents(){
    document.querySelectorAll('[data-tab]').forEach(el => {
      el.addEventListener('click', () => {
        setState({ tab: el.dataset.tab });
        cargarDatosTabActual();
      });
    });

    const btnAplicar = document.getElementById('btn-aplicar-filtro');
    if (btnAplicar) {
      btnAplicar.addEventListener('click', () => {
        state.filtroGlobal.desde = document.getElementById('g_desde').value;
        state.filtroGlobal.hasta = document.getElementById('g_hasta').value;
        cargarDatosTabActual();
      });
    }

    // Filtros de turnos
    const fc = document.getElementById('f_turno_chofer');
    if (fc) fc.addEventListener('change', e => setField('turnosFiltro','chofer', e.target.value));
    const fv = document.getElementById('f_turno_vehiculo');
    if (fv) fv.addEventListener('change', e => setField('turnosFiltro','vehiculo', e.target.value));
    const fe = document.getElementById('f_turno_estado');
    if (fe) fe.addEventListener('change', e => setField('turnosFiltro','estado', e.target.value));
    const btnFT = document.getElementById('btn-filtrar-turnos');
    if (btnFT) btnFT.addEventListener('click', cargarTurnos);

    // Filtros de gastos
    const gv = document.getElementById('f_gasto_vehiculo');
    if (gv) gv.addEventListener('change', e => setField('gastosFiltro','vehiculo', e.target.value));
    const gt = document.getElementById('f_gasto_tipo');
    if (gt) gt.addEventListener('change', e => setField('gastosFiltro','tipo', e.target.value));
    const gs = document.getElementById('f_gasto_sospechoso');
    if (gs) gs.addEventListener('change', e => setField('gastosFiltro','soloSospechosos', e.target.checked));
    const btnFG = document.getElementById('btn-filtrar-gastos');
    if (btnFG) btnFG.addEventListener('click', cargarGastos);

    // Filas clickeables → detalle de turno
    document.querySelectorAll('[data-detalle]').forEach(el => {
      el.addEventListener('click', () => abrirDetalleTurno(el.dataset.detalle));
    });

    const btnCerrarDet = document.getElementById('btn-cerrar-detalle');
    if (btnCerrarDet) btnCerrarDet.addEventListener('click', cerrarDetalle);
    const overlay = document.getElementById('overlay-detalle');
    if (overlay) overlay.addEventListener('click', e => { if (e.target === overlay) cerrarDetalle(); });

    // Ingresos extras
    const btnExtra = document.getElementById('btn-aplicar-extra');
    if(btnExtra) {
      btnExtra.addEventListener('click', () => {
        state.nombreIngresoExtra = document.getElementById('inp_nombre_extra').value;
        state.ingresoExtraManual = document.getElementById('inp_monto_extra').value;
        renderizarGraficos();
        render(); 
      });
    }
  }

  // Arranque del panel
  boot();
})();
</script>
</body>
</html>
